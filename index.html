<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0a1f">
<title>Daily Tarot | 每日塔罗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@400;600;700&display=swap">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --gold:#e8c76f; --gold-dim:#caa85c; --gold-deep:#9c7c3c;
  --ink:#f4ead0; --ink-dim:#b9aa88;
  --bg0:#0d0a1f; --bg1:#171233; --bg2:#241a4d;
  --cw: clamp(66px, 17vmin, 118px);
  --ch: calc(var(--cw) * 5 / 3);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; overflow:hidden; }
body{
  font-family:'Noto Serif SC', serif;
  color:var(--ink);
  background:
    radial-gradient(120vmax 90vmax at 50% -20%, #2c2160 0%, transparent 55%),
    radial-gradient(90vmax 70vmax at 85% 110%, #241a4d 0%, transparent 60%),
    linear-gradient(180deg, #100c26 0%, var(--bg0) 60%, #080614 100%);
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
}
#sky{ position:fixed; inset:0; z-index:0; pointer-events:none; }
#app{ position:fixed; inset:0; z-index:1; overflow:hidden; }

/* ---------- shared UI ---------- */
.btn{
  font-family:'Noto Serif SC',serif; font-size:15px; letter-spacing:.3em; text-indent:.3em;
  color:var(--ink); background:linear-gradient(180deg, rgba(232,199,111,.14), rgba(232,199,111,.04));
  border:1px solid rgba(232,199,111,.55); border-radius:999px;
  padding:12px 28px; cursor:pointer; backdrop-filter:blur(6px);
  transition:all .25s ease; box-shadow:0 0 0 rgba(232,199,111,0);
}
.btn:hover{ border-color:var(--gold); box-shadow:0 0 22px rgba(232,199,111,.28); transform:translateY(-1px); }
.btn:active{ transform:translateY(1px) scale(.98); }
.btn.primary{ background:linear-gradient(180deg, rgba(232,199,111,.32), rgba(200,160,70,.12)); font-weight:600; }
.btn.ghost{ border-color:rgba(232,199,111,.25); color:var(--ink-dim); letter-spacing:.18em; font-size:13px; padding:9px 20px; }
.btn:disabled{ opacity:.35; pointer-events:none; }

#sound-toggle,#lang-toggle{
  position:fixed; top:calc(env(safe-area-inset-top, 0px) + 14px); z-index:60;
  height:42px; border-radius:999px; border:1px solid rgba(232,199,111,.4);
  background:rgba(20,15,45,.5); color:var(--gold); cursor:pointer;
  backdrop-filter:blur(6px); transition:all .25s; font-family:'Noto Serif SC',serif;
}
#sound-toggle{ right:16px; width:42px; font-size:17px; }
#lang-toggle{ left:16px; padding:0 16px; font-size:13.5px; letter-spacing:.1em; }
#sound-toggle:hover,#lang-toggle:hover{ box-shadow:0 0 16px rgba(232,199,111,.3); }

.screen{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .6s ease, transform .6s ease; }
.screen.hidden{ opacity:0; pointer-events:none; transform:scale(.97); }

/* ---------- welcome ---------- */
#welcome{ text-align:center; padding:24px; gap:0; }
.w-emblem{ width:min(140px,20vmin); margin-bottom:10px; filter:drop-shadow(0 0 24px rgba(232,199,111,.35));
  animation:breathe 5s ease-in-out infinite; }
@keyframes breathe{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-8px) } }
.w-title-sub{ font-family:Cinzel,serif; font-size:clamp(13px,2.4vmin,17px); letter-spacing:.6em; text-indent:.6em;
  color:var(--gold-dim); margin-bottom:8px; }
.w-title{ font-weight:700; letter-spacing:.16em; text-indent:.16em;
  background:linear-gradient(180deg,#fdf3d3 20%, var(--gold) 55%, #a5813e 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 2px 14px rgba(232,199,111,.25)); }
.w-title.lat{ font-family:Cinzel,serif; font-size:clamp(30px,7vmin,50px); letter-spacing:.22em; text-indent:.22em; font-weight:600; }
.w-title.han{ font-size:clamp(34px,8vmin,56px); letter-spacing:.28em; text-indent:.28em; }
.w-divider{ display:flex; align-items:center; gap:12px; margin:16px 0 10px; color:var(--gold-dim); opacity:.9; }
.w-divider::before,.w-divider::after{ content:""; width:min(90px,18vw); height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim)); }
.w-divider::after{ transform:scaleX(-1); }
.w-sub{ color:var(--ink-dim); font-size:14px; letter-spacing:.14em; margin-bottom:26px; }
.spreads{ display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; justify-content:center; }
.spread-opt{
  width:min(180px,42vw); padding:18px 12px 16px; border-radius:14px; cursor:pointer;
  border:1px solid rgba(232,199,111,.28); background:linear-gradient(180deg, rgba(36,26,77,.55), rgba(16,12,38,.55));
  transition:all .3s ease; position:relative;
}
.spread-opt:hover{ transform:translateY(-4px); }
.spread-opt.on{ border-color:var(--gold); box-shadow:0 0 26px rgba(232,199,111,.22), inset 0 0 18px rgba(232,199,111,.06); }
.spread-opt .so-cards{ display:flex; justify-content:center; gap:5px; margin-bottom:12px; height:44px; align-items:center; }
.spread-opt .so-cards i{ display:block; width:26px; height:40px; border-radius:4px;
  border:1px solid rgba(232,199,111,.6); background:linear-gradient(160deg,#2b2058,#171233);
  box-shadow:0 3px 8px rgba(0,0,0,.5); }
.spread-opt .so-cards i:nth-child(2){ height:44px; width:28px; }
.spread-opt.on .so-cards i{ border-color:var(--gold); box-shadow:0 0 10px rgba(232,199,111,.35); }
.spread-opt .so-name{ font-size:15.5px; letter-spacing:.12em; margin-bottom:4px; }
.spread-opt .so-desc{ font-size:11.5px; color:var(--ink-dim); letter-spacing:.08em; }
.q-wrap{ width:min(400px, 86vw); margin-bottom:26px; position:relative; }
#q-input{
  width:100%; background:transparent; border:none; outline:none;
  border-bottom:1px solid rgba(232,199,111,.35);
  font-family:'Noto Serif SC',serif; font-size:14.5px; color:var(--ink);
  text-align:center; padding:8px 6px; letter-spacing:.06em; transition:border-color .3s;
}
#q-input::placeholder{ color:rgba(185,170,136,.55); letter-spacing:.1em; }
#q-input:focus{ border-bottom-color:var(--gold); }
.q-wrap::after{ content:"✦"; position:absolute; right:-4px; bottom:8px; color:rgba(232,199,111,.4); font-size:11px; pointer-events:none; }
#today-chip{ margin-top:18px; font-size:13px; color:var(--ink-dim); letter-spacing:.1em;
  border:none; background:none; cursor:pointer; text-decoration:underline dotted rgba(232,199,111,.5);
  text-underline-offset:5px; font-family:inherit; }
#today-chip:hover{ color:var(--gold); }

/* ---------- table ---------- */
#table{ justify-content:flex-start; }
#hint{
  margin-top:calc(env(safe-area-inset-top, 0px) + 26px); text-align:center; min-height:52px; z-index:40;
  font-size:clamp(15px,2.6vmin,18px); letter-spacing:.16em; text-indent:.16em; color:var(--ink);
  text-shadow:0 0 18px rgba(232,199,111,.25); transition:opacity .4s; padding:0 20px;
}
#hint small{ display:block; font-size:12px; letter-spacing:.14em; color:var(--ink-dim); margin-top:7px; }
#stage{ position:absolute; inset:0; }

/* ritual circle under the deck */
#ritual{ position:absolute; left:50%; top:50%; width:min(74vmin,560px); height:min(74vmin,560px);
  transform:translate(-50%,-50%); opacity:.5; pointer-events:none; transition:opacity .8s;
  animation:spin 140s linear infinite; }
@keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }
#ritual.gone-ritual{ opacity:.12; }
#deck-glow{ position:absolute; left:50%; top:50%; width:min(50vmin,380px); height:min(30vmin,230px);
  transform:translate(-50%,-46%); border-radius:50%; pointer-events:none;
  background:radial-gradient(closest-side, rgba(232,199,111,.20), rgba(232,199,111,.05) 55%, transparent 72%);
  animation:glowpulse 3.4s ease-in-out infinite; transition:opacity .6s; }
@keyframes glowpulse{ 0%,100%{ opacity:.65; transform:translate(-50%,-46%) scale(1);} 50%{ opacity:1; transform:translate(-50%,-46%) scale(1.07);} }
#deck-glow.off{ animation:none; opacity:0; }

/* ---------- cards ---------- */
.card{
  position:absolute; left:50%; top:50%;
  width:var(--cw); height:var(--ch);
  margin-left:calc(var(--cw) / -2); margin-top:calc(var(--ch) / -2);
  transform-style:preserve-3d; cursor:pointer;
  transition:transform .75s cubic-bezier(.34,1.2,.4,1), opacity .5s ease;
  will-change:transform;
}
.card .inner{
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform .3s ease;
}
.card.flipped .inner{ transform:rotateY(180deg); transition:transform .85s cubic-bezier(.35,.1,.25,1); }
.face{
  position:absolute; inset:0; border-radius:9.5% / 5.7%;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden; background:var(--bg1);
  box-shadow:0 7px 20px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.4);
}
.face svg{ display:block; width:100%; height:100%; }
.face.front{ transform:rotateY(180deg); }
.face.back::after{ /* moving sheen on the card back */
  content:""; position:absolute; inset:0;
  background:linear-gradient(115deg, transparent 30%, rgba(255,240,200,.10) 45%, rgba(255,240,200,.16) 50%, rgba(255,240,200,.10) 55%, transparent 70%);
  background-size:260% 260%; animation:sheen 5.5s ease-in-out infinite;
}
@keyframes sheen{ 0%{ background-position:120% 0 } 55%,100%{ background-position:-120% 0 } }

#stage.fan .card:not(.selected):not(.gone):hover .inner{ transform:translateY(calc(var(--ch) * -0.16)) scale(1.05); }
#stage.fan .card:not(.selected):not(.gone):hover .face{ box-shadow:0 16px 34px rgba(0,0,0,.6), 0 0 22px rgba(232,199,111,.3); }
.card.selected .inner{ transform:translateY(calc(var(--ch) * -0.24)); }
.card.selected .face{ box-shadow:0 18px 40px rgba(0,0,0,.65), 0 0 0 2px var(--gold), 0 0 30px rgba(232,199,111,.55); }
.card.gone{ opacity:0; pointer-events:none; }
.card.revealing{ transition:transform .9s cubic-bezier(.3,1.1,.35,1); }
.card.glowing .face{ box-shadow:0 20px 50px rgba(0,0,0,.6), 0 0 44px rgba(232,199,111,.5); }
.slot-tag{
  position:absolute; left:50%; bottom:-34px; transform:translateX(-50%);
  transform-origin:50% 0;
  font-size:12.5px; letter-spacing:.25em; text-indent:.25em; color:var(--gold-dim); white-space:nowrap;
  opacity:0; transition:opacity .6s .3s;
}
.card.placed .slot-tag{ opacity:1; }

/* pile hint labels for cutting */
.pile-tag{ position:absolute; left:50%; top:-42px; transform:translateX(-50%);
  font-family:Cinzel,serif; color:var(--gold-dim); font-size:15px; letter-spacing:.2em;
  opacity:0; transition:opacity .4s .35s; pointer-events:none; white-space:nowrap; }
#stage.cut .card.pile-top .pile-tag{ opacity:.95; }
#stage.cut .card.pile-top:hover .face{ box-shadow:0 12px 30px rgba(0,0,0,.6), 0 0 26px rgba(232,199,111,.4); }

/* action bar */
#actions{ position:absolute; bottom:calc(env(safe-area-inset-bottom, 0px) + 26px); left:0; right:0;
  display:flex; justify-content:center; gap:14px; z-index:45; flex-wrap:wrap; padding:0 16px;
  transition:opacity .4s, transform .4s; }
#actions.hidden{ opacity:0; pointer-events:none; transform:translateY(14px); }
#pick-count{ position:absolute; bottom:calc(env(safe-area-inset-bottom, 0px) + 88px); left:0; right:0; text-align:center;
  font-family:Cinzel,serif; color:var(--gold-dim); letter-spacing:.35em; font-size:13px; opacity:0; transition:opacity .4s; }
#pick-count.show{ opacity:1; }

/* sparks on reveal */
.spark{ position:absolute; width:7px; height:7px; pointer-events:none; z-index:80;
  background:radial-gradient(circle, #fff6d8 0%, var(--gold) 45%, transparent 70%);
  border-radius:50%; }

/* ---------- reading sheet ---------- */
#sheet{
  position:fixed; left:50%; bottom:0; transform:translate(-50%,105%); z-index:50;
  width:min(680px, calc(100% - 20px));
  max-height:52%; overflow-y:auto; overscroll-behavior:contain;
  background:linear-gradient(180deg, rgba(30,22,64,.92), rgba(14,10,32,.96));
  border:1px solid rgba(232,199,111,.35); border-bottom:none; border-radius:22px 22px 0 0;
  backdrop-filter:blur(14px); padding:16px 22px calc(env(safe-area-inset-bottom, 0px) + 18px);
  box-shadow:0 -18px 60px rgba(0,0,0,.55);
  transition:transform .7s cubic-bezier(.3,1,.3,1);
}
#sheet.show{ transform:translate(-50%,0); }
#sheet::-webkit-scrollbar{ width:4px } #sheet::-webkit-scrollbar-thumb{ background:rgba(232,199,111,.3); border-radius:2px }
.sheet-handle{ width:44px; height:4px; border-radius:2px; background:rgba(232,199,111,.4); margin:0 auto 14px; }
.reading{ padding:6px 0 14px; }
.reading + .reading{ border-top:1px dashed rgba(232,199,111,.22); padding-top:16px; }
.r-pos{ font-size:12px; letter-spacing:.35em; text-indent:.35em; color:var(--gold-dim); text-align:center; margin-bottom:6px; font-family:Cinzel,serif; }
.r-head{ display:flex; align-items:baseline; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
.r-name{ font-size:21px; font-weight:700; letter-spacing:.06em; color:var(--ink); }
.r-name.lat{ font-family:Cinzel,serif; font-weight:600; letter-spacing:.1em; }
.r-en{ font-family:Cinzel,serif; font-size:12px; letter-spacing:.2em; color:var(--ink-dim); }
.r-ori{ font-size:11.5px; padding:2.5px 10px; border-radius:999px; letter-spacing:.14em; text-indent:.14em; }
.r-ori.up{ color:#ffe9ad; border:1px solid rgba(232,199,111,.55); background:rgba(232,199,111,.12); }
.r-ori.rev{ color:#c9b6ff; border:1px solid rgba(156,124,255,.5); background:rgba(124,92,220,.14); }
.r-kws{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin:10px 0 12px; }
.r-kw{ font-size:12px; color:var(--gold-dim); border:1px solid rgba(232,199,111,.3); border-radius:999px;
  padding:3px 12px; letter-spacing:.08em; background:rgba(232,199,111,.05); }
.r-text{ font-size:14.5px; line-height:1.9; color:var(--ink); text-align:justify; letter-spacing:.02em; }
.sheet-btns{ display:flex; justify-content:center; gap:12px; margin-top:6px; padding-top:14px;
  border-top:1px solid rgba(232,199,111,.18); flex-wrap:wrap; }

/* oracle block */
.oracle{ margin-top:14px; border:1px solid rgba(232,199,111,.3); border-radius:14px;
  padding:14px 16px 16px; background:linear-gradient(180deg, rgba(232,199,111,.07), rgba(232,199,111,.02)); }
.o-head{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.o-title{ font-family:Cinzel,serif; font-size:13px; letter-spacing:.3em; text-indent:.3em; color:var(--gold); }
.o-badge{ font-size:10.5px; letter-spacing:.12em; color:var(--ink-dim); border:1px solid rgba(232,199,111,.25);
  border-radius:999px; padding:2px 10px; }
.o-text{ font-size:14.5px; line-height:1.95; color:var(--ink); text-align:justify; letter-spacing:.02em; min-height:28px; }
.o-text .o-shimmer{
  background:linear-gradient(90deg, var(--ink-dim) 25%, #fff6d8 50%, var(--ink-dim) 75%);
  background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:shimmer 1.6s linear infinite; letter-spacing:.08em;
}
@keyframes shimmer{ to{ background-position:-200% 0 } }
.o-q{ text-align:center; font-size:12.5px; color:var(--ink-dim); margin-bottom:8px; letter-spacing:.04em; }
.o-q b{ color:var(--gold-dim); font-weight:400; }

#toast{ position:fixed; left:50%; top:18%; transform:translate(-50%,-8px); z-index:99;
  background:rgba(20,15,45,.9); border:1px solid rgba(232,199,111,.5); color:var(--ink);
  font-size:13.5px; letter-spacing:.12em; padding:10px 22px; border-radius:999px;
  opacity:0; pointer-events:none; transition:all .4s; backdrop-filter:blur(8px); }
#toast.show{ opacity:1; transform:translate(-50%,0); }

/* svg typography */
text.rn{ font-family:Cinzel,serif; font-size:30px; fill:var(--gold); letter-spacing:3px; }
text.zh{ font-family:'Noto Serif SC',serif; font-size:34px; font-weight:600; fill:var(--ink); letter-spacing:8px; }
text.en{ font-family:Cinzel,serif; font-size:14.5px; fill:var(--gold-dim); letter-spacing:3px; }
text.fen{ font-family:Cinzel,serif; fill:var(--ink); letter-spacing:2px; font-weight:600; }
text.fzh{ font-family:'Noto Serif SC',serif; font-size:17px; fill:var(--gold-dim); letter-spacing:7px; }

@media (max-height:640px){
  .w-sub{ margin-bottom:16px } .spreads{ margin-bottom:16px } .q-wrap{ margin-bottom:18px }
  #sheet{ max-height:62% }
}

/* ============================================================
   UI polish layer
   ============================================================ */
/* cinematic vignette over the table (below sheet & toasts) */
body::after{ content:""; position:fixed; inset:0; pointer-events:none; z-index:4;
  background:radial-gradient(130% 100% at 50% 42%, transparent 55%, rgba(4,2,12,.55) 100%); }

/* slow-drifting nebula fog */
.fog{ position:fixed; width:72vmax; height:72vmax; border-radius:50%; pointer-events:none; z-index:0; }
.fog.f1{ top:-22vmax; left:-16vmax;
  background:radial-gradient(circle, rgba(96,74,190,.11), transparent 62%);
  animation:fogDrift1 46s ease-in-out infinite alternate; }
.fog.f2{ bottom:-26vmax; right:-18vmax;
  background:radial-gradient(circle, rgba(176,120,64,.09), transparent 62%);
  animation:fogDrift2 58s ease-in-out infinite alternate; }
@keyframes fogDrift1{ to{ transform:translate(9vmax,7vmax) scale(1.12); } }
@keyframes fogDrift2{ to{ transform:translate(-10vmax,-6vmax) scale(1.08); } }

/* shimmering gold title */
.w-title{
  background-image:linear-gradient(105deg,#fdf3d3 12%, var(--gold) 38%, #a5813e 55%, #fdf3d3 82%, var(--gold) 100%);
  background-size:250% auto;
  animation:titleShine 8s linear infinite;
}
@keyframes titleShine{ to{ background-position:-250% center } }

/* ornamental double frame around the welcome screen */
#welcome::before{ content:""; position:absolute; inset:12px; border:1px solid rgba(232,199,111,.16);
  border-radius:20px; pointer-events:none; }
#welcome::after{ content:""; position:absolute; inset:18px; border:1px solid rgba(232,199,111,.07);
  border-radius:15px; pointer-events:none; }

/* staggered entrance */
#welcome.anim > *{ animation:riseIn .85s cubic-bezier(.2,.7,.3,1) both; }
#welcome.anim > *:nth-child(1){ animation-delay:.05s } #welcome.anim > *:nth-child(2){ animation-delay:.14s }
#welcome.anim > *:nth-child(3){ animation-delay:.22s } #welcome.anim > *:nth-child(4){ animation-delay:.30s }
#welcome.anim > *:nth-child(5){ animation-delay:.38s } #welcome.anim > *:nth-child(6){ animation-delay:.46s }
#welcome.anim > *:nth-child(7){ animation-delay:.54s } #welcome.anim > *:nth-child(8){ animation-delay:.62s }
#welcome.anim > *:nth-child(9){ animation-delay:.70s }
#welcome.anim .w-emblem{ animation:riseIn .85s .05s cubic-bezier(.2,.7,.3,1) both, breathe 5s 1.1s ease-in-out infinite; }
@keyframes riseIn{ from{ opacity:0; transform:translateY(24px) } to{ opacity:1; transform:translateY(0) } }

/* spread options: real miniature card backs */
.spread-opt{ overflow:hidden; }
.spread-opt .so-cards{ height:56px; gap:7px; }
.spread-opt .so-cards svg{ width:30px; height:50px; border-radius:4px;
  box-shadow:0 4px 12px rgba(0,0,0,.55); transition:transform .35s ease, box-shadow .35s ease; }
.spread-opt[data-n="3"] .so-cards svg:nth-child(1){ transform:rotate(-9deg) translateY(2px); }
.spread-opt[data-n="3"] .so-cards svg:nth-child(3){ transform:rotate(9deg) translateY(2px); }
.spread-opt:hover .so-cards svg{ transform:translateY(-3px); box-shadow:0 8px 16px rgba(0,0,0,.6); }
.spread-opt[data-n="3"]:hover .so-cards svg:nth-child(1){ transform:rotate(-12deg) translateY(-2px); }
.spread-opt[data-n="3"]:hover .so-cards svg:nth-child(3){ transform:rotate(12deg) translateY(-2px); }
.spread-opt.on .so-cards svg{ box-shadow:0 4px 14px rgba(0,0,0,.55), 0 0 14px rgba(232,199,111,.35); }
.spread-opt.on::before{ content:"✦"; position:absolute; top:7px; right:11px; font-size:12px;
  color:var(--gold); text-shadow:0 0 10px rgba(232,199,111,.9); animation:checkPop .35s cubic-bezier(.3,1.6,.5,1) both; }
@keyframes checkPop{ from{ transform:scale(0) rotate(-90deg); opacity:0 } to{ transform:scale(1) rotate(0); opacity:1 } }

/* breathing start button */
.btn.primary{ animation:btnGlow 3.4s ease-in-out infinite; }
@keyframes btnGlow{ 0%,100%{ box-shadow:0 0 8px rgba(232,199,111,.10) } 50%{ box-shadow:0 0 26px rgba(232,199,111,.38) } }

/* quieter corner toggles */
#sound-toggle,#lang-toggle{ background:rgba(14,10,32,.35); border-color:rgba(232,199,111,.26); color:var(--gold-dim); }
#sound-toggle:hover,#lang-toggle:hover{ color:var(--gold); border-color:rgba(232,199,111,.55); }

/* gilt inner edge + depth on every card face */
.face::before{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none; z-index:3;
  box-shadow:inset 0 0 0 1.5px rgba(232,199,111,.20), inset 0 0 26px rgba(8,5,22,.55); }

/* reading sheet refinements */
.sheet-handle{ width:110px; height:2px; border-radius:1px; margin:2px auto 16px;
  background:linear-gradient(90deg, transparent, var(--gold-dim) 30%, var(--gold) 50%, var(--gold-dim) 70%, transparent);
  box-shadow:0 0 8px rgba(232,199,111,.35); position:relative; }
.r-pos::before{ content:"✦"; margin-right:12px; opacity:.45; font-size:9px; vertical-align:2px; }
.r-pos::after{ content:"✦"; margin-left:12px; opacity:.45; font-size:9px; vertical-align:2px; }
.oracle{ position:relative; }
.oracle::before{ content:""; position:absolute; inset:4px; border:1px solid rgba(232,199,111,.13);
  border-radius:10px; pointer-events:none; }
.o-title{ text-shadow:0 0 14px rgba(232,199,111,.45); }

/* keep the hint clear of the corner toggles on phones */
#hint{ padding:0 66px; }
@media (min-width:700px){ #hint{ padding:0 20px; } }

/* reduced motion: keep it calm */
@media (prefers-reduced-motion: reduce){
  .w-title,#welcome.anim > *,.btn.primary,.fog,.w-emblem{ animation:none !important; }
}

 upE:"The Fool steps off the known path with a light pack and an open heart. Say yes to the untried thing today — beginnings favour you, and what looks like a cliff is often a doorstep.",
 upZ:"愚者背着轻便的行囊踏出熟悉的路。今天适合对那件未曾尝试的事说「好」——开始眷顾你，看似悬崖之处往往是门阶。",
 revE:"Reversed, the Fool warns of a leap made blind — or one endlessly postponed. Look before you jump today, but don't let looking become the excuse never to move.",
 revZ:"逆位的愚者提醒：纵身一跃不可盲目，也不可无限期推迟。今天跳之前先看清楚，但别让「再看看」变成永远不动的借口。",
 advE:"Start before you feel fully ready — just check your shoes first.",advZ:"在完全准备好之前就出发——只是先系好鞋带。"},
{rn:"I",en:"The Magician",zh:"魔术师",thE:"focused will made real",thZ:"化意志为现实",
 kwU:["willpower","skill","manifestation"],kwUz:["意志力","才能","心想事成"],
 kwR:["scattered focus","untapped gifts","hesitation"],kwRz:["精力分散","才华未展","迟疑"],
 upE:"Everything you need is already on the table: skill, words, tools, timing. Today favours launches, pitches and first moves — direct your will at one point and watch things align.",
 upZ:"你所需要的一切已在桌上：技能、言辞、工具与时机。今天适合启动、提案与主动出击——把意志对准一处，事情自会排列成行。",
 revE:"Reversed, the Magician scatters — many ideas, little landing. Choose one intention today and see it through; unfocused talent is only noise.",
 revZ:"逆位的魔术师能量散乱——想法很多，落地很少。今天只选一个目标并把它做完；不聚焦的才华只是噪音。",
 advE:"Pick one thing. Begin it. Finish it.",advZ:"选一件事。开始它。完成它。"},
{rn:"II",en:"The High Priestess",zh:"女祭司",thE:"inner knowing",thZ:"内在的直觉",
 kwU:["intuition","stillness","hidden knowledge"],kwUz:["直觉","静观","潜藏的智慧"],
 kwR:["ignored instincts","restlessness","secrets"],kwRz:["忽视直觉","心浮气躁","秘而不宣"],
 upE:"The answer you're chasing is not in more information but in stillness. Trust the quiet knowing beneath your reasoning today — it has already read the room.",
 upZ:"你追寻的答案不在更多的信息里，而在安静之中。今天请相信理性之下那份沉静的知晓——它早已看清全局。",
 revE:"Reversed, she suggests you've been talking over your own intuition. Step out of the noise, sit alone with the question, and honour the first honest answer you hear.",
 revZ:"逆位的女祭司暗示你一直在用喧嚣盖过自己的直觉。今天离开噪音，独自与问题相处，尊重心里浮现的第一个诚实答案。",
 advE:"Say less, sense more.",advZ:"少说，多感受。"},
{rn:"III",en:"The Empress",zh:"女皇",thE:"nurture and abundance",thZ:"滋养与丰盛",
 kwU:["abundance","nurture","beauty"],kwUz:["丰盛","滋养","美与爱"],
 kwR:["overgiving","dependence","creative block"],kwRz:["过度付出","依赖","灵感枯竭"],
 upE:"The Empress brings warmth, growth and plenty. Tend something today — a relationship, a project, yourself — and it will visibly flourish under your hands.",
 upZ:"女皇带来温暖、生长与丰盛。今天去照料一样东西——一段关系、一个项目、或你自己——它会在你手中肉眼可见地繁茂起来。",
 revE:"Reversed, she asks whether you've been pouring from an empty cup. Care for your own needs first today; real nourishment must include you.",
 revZ:"逆位的女皇在问：你是否一直在用空了的杯子倒水？今天先照顾自己的需要；真正的滋养必须包括你自己。",
 advE:"Buy the flowers. Cook the good meal. Sleep early.",advZ:"买那束花，做顿好饭，早点睡。"},
{rn:"IV",en:"The Emperor",zh:"皇帝",thE:"order and steady ground",thZ:"秩序与根基",
 kwU:["structure","authority","stability"],kwUz:["秩序","掌控","稳固"],
 kwR:["rigidity","overcontrol","disorder"],kwRz:["僵化","控制过度","失序"],
 upE:"Structure is your ally today. Set the plan, define the boundary, make the firm call — steady foundations laid now buy you freedom later.",
 upZ:"今天，秩序是你的盟友。定好计划、划清边界、果断拍板——此刻打下的稳固地基，会换来日后的自由。",
 revE:"Reversed, the Emperor grips too hard. Loosen control where it isn't needed, and be wary of rigid rules today — your own included.",
 revZ:"逆位的皇帝握得太紧。今天在不必要的地方松开手，警惕僵硬的规则——包括你给自己定的那些。",
 advE:"Build the frame, then live inside it lightly.",advZ:"先立框架，再在其中轻盈地生活。"},
{rn:"V",en:"The Hierophant",zh:"教皇",thE:"guidance and tradition",thZ:"传承与指引",
 kwU:["tradition","mentorship","shared belief"],kwUz:["传承","导师","信念"],
 kwR:["dogma","rebellion","empty ritual"],kwRz:["教条","为反而反","形式主义"],
 upE:"Lasting wisdom is usually inherited. Ask the mentor, read the manual, follow the proven path today — tradition is holding a shortcut for you.",
 upZ:"经得起时间的智慧多半是传下来的。今天去请教前辈、读读正典、走一走被验证过的路——传统正为你藏着一条捷径。",
 revE:"Reversed, the Hierophant invites you to question the rulebook. Follow your own considered judgement today — but rebel for a reason, not for the pose.",
 revZ:"逆位的教皇请你质疑规则本身。今天可以依自己深思后的判断行事——但叛逆要有理由，而不是为了姿态。",
 advE:"Call the person who has walked this road before.",advZ:"联系那位走过这条路的人，听听他的建议。"},
{rn:"VI",en:"The Lovers",zh:"恋人",thE:"connection and true choice",thZ:"连结与真心的选择",
 kwU:["love","alignment","a heartfelt choice"],kwUz:["爱","心意相通","重要选择"],
 kwR:["indecision","imbalance","disharmony"],kwRz:["犹豫不决","失衡","心口不一"],
 upE:"Hearts speak clearly today. It favours honest conversations, reconciliation, and decisions made from your values — choose what you actually love.",
 upZ:"今天，心与心的对话格外通畅。适合坦诚交流、和解，也适合依照自己的价值观做决定——选择你真正所爱的。",
 revE:"Reversed, the Lovers point at a choice you keep deferring. Remember: not choosing is also a choice — usually the worst one on the table.",
 revZ:"逆位的恋人指向那个你一再推迟的选择。请记得：不选择也是一种选择——而且往往是桌上最差的那个。",
 advE:"Choose the answer your heart drafted long ago.",advZ:"选择你心里早已写好的那个答案。"},
{rn:"VII",en:"The Chariot",zh:"战车",thE:"will and victory",thZ:"意志与胜利",
 kwU:["victory","drive","clear direction"],kwUz:["胜利","冲劲","方向明确"],
 kwR:["drifting","burnout","lost reins"],kwRz:["漂移失向","内耗","缰绳脱手"],
 upE:"Momentum is with you. Fix your destination, take the reins, and drive — obstacles tend to yield to a clear direction today.",
 upZ:"势头正站在你这边。定好目的地，握紧缰绳，全力前进——今天，清晰的方向所到之处，阻碍多会让路。",
 revE:"Reversed, the Chariot spins its wheels: full throttle, no map. Stop, name where you're actually going, then move again.",
 revZ:"逆位的战车在原地空转：油门踩满，却没有地图。先停下来，说清自己究竟要去哪里，再重新出发。",
 advE:"Write the goal down; watch the road, not the crowd.",advZ:"把目标写下来；看路，不看观众。"},
{rn:"VIII",en:"Strength",zh:"力量",thE:"gentle courage",thZ:"温柔而坚定的勇气",
 kwU:["courage","patience","gentle power"],kwUz:["勇气","耐心","以柔克刚"],
 kwR:["self-doubt","impatience","forcing it"],kwRz:["自我怀疑","急躁","硬碰硬"],
 upE:"Real strength today is soft-handed: patience, warmth, nerve held quietly. Tame the difficulty rather than wrestling it, and you will win.",
 upZ:"今天真正的力量是柔软的：耐心、温暖、沉住气。驯服难题，而不是与它角力，你会赢。",
 revE:"Reversed, Strength shows self-doubt roaring louder than any lion. You are more capable than today's inner critic claims — prove it with one small brave act.",
 revZ:"逆位的力量显示：自我怀疑的吼声比狮子还大。你远比今天心里那个批评者所说的更有能力——用一件小小的勇敢之事证明给自己看。",
 advE:"Breathe, smile, and handle it without raising your voice.",advZ:"深呼吸，微笑，然后不动声色地把它解决。"},
{rn:"IX",en:"The Hermit",zh:"隐士",thE:"the inward light",thZ:"内省之光",
 kwU:["solitude","insight","inner light"],kwUz:["独处","洞见","心中明灯"],
 kwR:["isolation","avoidance","withdrawal"],kwRz:["自我隔绝","逃避","过度封闭"],
 upE:"Step back from the noise. One hour of honest solitude today will show you what a week of busy motion cannot.",
 upZ:"从喧嚣中退后一步。今天一小时诚实的独处，能让你看清忙碌一周都看不清的东西。",
 revE:"Reversed, the Hermit has stayed in the cave too long. Solitude was rest; now it is hiding. Reach out to one person today.",
 revZ:"逆位的隐士在洞里待得太久了。独处本是休息，如今成了躲藏。今天主动联系一个人吧。",
 advE:"One hour, notifications off — a meeting with yourself.",advZ:"关掉通知一小时，与自己开一场会。"},
{rn:"X",en:"Wheel of Fortune",zh:"命运之轮",thE:"turning fortune",thZ:"流转的机运",
 kwU:["luck","turning point","good timing"],kwUz:["好运","转机","顺势而为"],
 kwR:["bad timing","resistance","loops"],kwRz:["时运不济","抗拒变化","循环往复"],
 upE:"The Wheel turns your way — chance meetings, sudden openings, uncanny timing. Don't cling to the plan; ride the turn while it's moving.",
 upZ:"命运之轮正转向你——不期而遇、忽然出现的机会、恰到好处的时机。别死守原计划；趁轮子在转，顺势而上。",
 revE:"Reversed, the Wheel drags: a low arc of the cycle, not a final verdict. Do what is yours to do, and let the season change on its own schedule.",
 revZ:"逆位的轮子转得沉：这只是周期里的低谷弧线，不是最终判决。把你能做的做好，让季节按它自己的时刻表更替。",
 advE:"Say yes to the unexpected door.",advZ:"对突然打开的那扇门说「好」。"},
{rn:"XI",en:"Justice",zh:"正义",thE:"truth and balance",thZ:"真相与平衡",
 kwU:["fairness","truth","accountability"],kwUz:["公正","真相","因果分明"],
 kwR:["bias","imbalance","avoidance"],kwRz:["偏颇","失衡","逃避责任"],
 upE:"Cause meets effect today. Contracts, verdicts, difficult fairness — the plain truth is your strongest position, so stand on it.",
 upZ:"今天，因与果相遇。合约、裁断、艰难的公平——朴素的真相就是你最有力的立场，站稳它。",
 revE:"Reversed, Justice warns of a thumb on your own scale. Own your part honestly today; balance restored late always costs double.",
 revZ:"逆位的正义提醒你：秤上可能压着自己的手指。今天诚实认领属于你的那部分责任；迟来的平衡，代价总是加倍。",
 advE:"Do the right thing, not the easy one.",advZ:"做对的事，而不是容易的事。"},
{rn:"XII",en:"The Hanged Man",zh:"倒吊人",thE:"surrender and new angles",thZ:"换位与放手",
 kwU:["new perspective","pause","letting go"],kwUz:["换个角度","暂停","放手"],
 kwR:["stalling","futile sacrifice","martyrdom"],kwRz:["拖延僵持","无谓牺牲","自我感动"],
 upE:"The delay is the lesson. Hang loose today, turn the question upside down, and the stuck thing will show you its hidden hinge.",
 upZ:"停滞本身就是功课。今天松开执念，把问题倒过来看，卡住的事情会向你露出隐藏的转轴。",
 revE:"Reversed, you're sacrificing for something that stopped deserving it. Cut the loss and take your hands back.",
 revZ:"逆位的倒吊人说：你正在为一件不再值得的事付出。及时止损，把双手收回来。",
 advE:"Explain the problem to an outsider — and hear yourself solve it.",advZ:"把问题讲给一个外行听——你会听见自己说出答案。"},
{rn:"XIII",en:"Death",zh:"死神",thE:"endings that set you free",thZ:"结束与新生",
 kwU:["transformation","endings","renewal"],kwUz:["蜕变","告一段落","新生"],
 kwR:["clinging","stagnation","the slow goodbye"],kwRz:["不肯放手","停滞","拖长的告别"],
 upE:"A chapter is closing so a truer one can open. Let the outworn habit, role or story go today — the transformation is already in motion.",
 upZ:"一个章节正在合上，是为了让更真实的一章打开。今天送别那个过时的习惯、角色或故事——蜕变其实已经在路上。",
 revE:"Reversed, Death lingers at a door you won't shut. The slow goodbye is costing more than a clean one would. End it kindly — today.",
 revZ:"逆位的死神徘徊在你不肯关上的门前。拖长的告别，比干脆的告别代价更大。今天，温和而果断地了结它。",
 advE:"Delete it, return it, say goodbye — travel lighter.",advZ:"删掉它、归还它、道个别——轻装上路。"},
{rn:"XIV",en:"Temperance",zh:"节制",thE:"balance and patient blending",thZ:"调和与平衡",
 kwU:["balance","moderation","patience"],kwUz:["平衡","适度","细水长流"],
 kwR:["excess","extremes","haste"],kwRz:["过度","走极端","操之过急"],
 upE:"Today's magic word is 'blend'. Work and rest, logic and feeling, yours and theirs — mixed patiently, everything flows.",
 upZ:"今天的关键词是「调和」。工作与休息、理性与感性、你的与他人的——耐心兑在一起，万事顺流。",
 revE:"Reversed, something has tipped into excess. Come back toward the middle today, before the middle has to come for you.",
 revZ:"逆位的节制说明某处已经过量。今天主动回到中间地带——别等失衡来强行纠正你。",
 advE:"Slower is faster today.",advZ:"今天，慢慢来反而比较快。"},
{rn:"XV",en:"The Devil",zh:"恶魔",thE:"shadow and liberation",thZ:"欲望与解脱",
 kwU:["desire","attachment","facing the shadow"],kwUz:["欲望","执念","直面阴影"],
 kwR:["release","awakening","breaking chains"],kwRz:["挣脱","觉醒","锁链松动"],
 upE:"Temptation dresses well today — the doomscroll, the splurge, the old bad habit. See the chain clearly, then choose with open eyes; the key has been in your hand all along.",
 upZ:"今天的诱惑格外体面——无止境的刷屏、冲动消费、旧习复发。先看清那条锁链，再睁着眼睛做选择；钥匙其实一直在你手里。",
 revE:"Reversed is good news: the chain is already loosening. This is the day to quit the habit, leave the drain, unhook the claw. You are freer than you think.",
 revZ:"逆位是个好消息：锁链已经在松动。今天正适合戒掉恶习、离开消耗你的人与事。你比自己以为的自由得多。",
 advE:"Between want and need stands one good night's sleep.",advZ:"「想要」与「需要」之间，隔着一夜好眠。"},
{rn:"XVI",en:"The Tower",zh:"高塔",thE:"sudden clearing truth",thZ:"破而后立",
 kwU:["upheaval","revelation","breakthrough"],kwUz:["剧变","真相大白","破局"],
 kwR:["aftershocks","a needed demolition","narrow escape"],kwRz:["余震","该拆的迟早要拆","侥幸脱险"],
 upE:"Something unstable may crack today — a plan, an assumption. Let it. Only the false floors fall, and the ground underneath them is real.",
 upZ:"今天，某个不稳的东西可能会裂开——一个计划、一个假设。让它裂。塌掉的都是假地板，底下的地面才是真的。",
 revE:"Reversed, you're propping up what wants to collapse. A controlled demolition beats waiting for the storm — take it down on your own terms.",
 revZ:"逆位的高塔说明你在勉强支撑一个摇摇欲坠的局面。主动、可控地拆除，好过等风暴来拆——按你自己的节奏来。",
 advE:"The plot twist is a better script — read it.",advZ:"计划外的剧情往往是更好的剧本——读下去。"},
{rn:"XVII",en:"The Star",zh:"星星",thE:"hope and healing",thZ:"希望与疗愈",
 kwU:["hope","healing","quiet renewal"],kwUz:["希望","疗愈","静静复原"],
 kwR:["dimmed faith","doubt","delayed wishes"],kwRz:["信心黯淡","怀疑","愿望迟到"],
 upE:"After the storm, the sky remembers you. Hope, healing and gentle renewal flow today — make the wish, mend the bridge, water the dream.",
 upZ:"风雨之后，天空记得你。今天流淌着希望与疗愈的能量——许下心愿、修复关系、为梦想浇一次水。",
 revE:"Reversed, the stars are only clouded, not gone. Refuse the small voice that says 'never'. Hope is closer than today's evidence suggests.",
 revZ:"逆位的星星只是被云遮住，并没有熄灭。别听那个说「不可能了」的小声音。希望比今天所见的证据更近。",
 advE:"Write one wish down, and do one small thing for it.",advZ:"写下一个愿望，并为它做一件小事。"},
{rn:"XVIII",en:"The Moon",zh:"月亮",thE:"dreams and uncertainty",thZ:"梦境与朦胧",
 kwU:["intuition","dreams","uncertainty"],kwUz:["直觉","梦境","真假难辨"],
 kwR:["fog lifting","clarity returning","relief"],kwRz:["迷雾散去","恢复清明","安心"],
 upE:"Not everything today is as lit as it looks. Feelings amplify and facts blur — postpone the big verdict, note your dreams, and let the tide finish moving.",
 upZ:"今天所见未必如表面明亮。情绪易被放大，事实容易失焦——重大结论先缓一缓，留意梦的提示，让潮水走完它的路。",
 revE:"Reversed, the fog is lifting. A confusion clarifies, an anxiety shrinks in daylight. You can trust your own eyes again.",
 revZ:"逆位的月亮意味着迷雾正在散去。误会将澄清，焦虑在日光下缩小。你可以重新相信自己的眼睛了。",
 advE:"What midnight cannot solve, morning will.",advZ:"午夜想不通的事，交给清晨。"},
{rn:"XIX",en:"The Sun",zh:"太阳",thE:"joy and clear light",thZ:"喜悦与光明",
 kwU:["joy","success","vitality"],kwUz:["喜悦","成功","生命力"],
 kwR:["a delayed win","quiet joy","thin clouds"],kwRz:["迟到的胜利","低调的快乐","薄云蔽日"],
 upE:"The brightest card in the deck rises for you. Confidence, vitality and good news travel together today — shine without apology, and share the warmth.",
 upZ:"整副牌中最明亮的一张为你升起。今天自信、活力与好消息同行——大大方方地发光，也把温暖分给别人。",
 revE:"Reversed, the sun sits behind thin cloud. The win arrives slightly late but it arrives — keep your face toward the light.",
 revZ:"逆位的太阳只是隔着薄云。胜利会稍稍迟到，但不会缺席——继续朝着光的方向。",
 advE:"Celebrate something today, however small.",advZ:"今天庆祝一件事，再小也值得。"},
{rn:"XX",en:"Judgement",zh:"审判",thE:"awakening and second birth",thZ:"觉醒与重生",
 kwU:["awakening","a calling","rebirth"],kwUz:["觉醒","内心召唤","重获新生"],
 kwR:["self-judgement","doubt","the unanswered call"],kwRz:["自我审判","犹疑","搁置的召唤"],
 upE:"Something in you is being called to rise — the decision you've postponed, the self you've outgrown. Answer the call today; the past turns into fuel.",
 upZ:"你内在有个声音正召唤你起身——那个被推迟的决定、那个早已长大的自己。今天回应它；过往会化作燃料。",
 revE:"Reversed, you keep retrying yourself in an inner courtroom. Pardon the person you were, close the case, and walk forward.",
 revZ:"逆位的审判显示你还在内心的法庭上反复审讯自己。赦免曾经的你，结案，向前走。",
 advE:"Answer the call you've kept on hold.",advZ:"回应那个被你搁置已久的召唤。"},
{rn:"XXI",en:"The World",zh:"世界",thE:"completion and wholeness",thZ:"圆满与完成",
 kwU:["completion","achievement","integration"],kwUz:["圆满","达成","融会贯通"],
 kwR:["loose ends","almost there","needing closure"],kwRz:["收尾未完","只差一步","需要一个了结"],
 upE:"A circle completes: the goal lands, the journey rounds home. Take the bow — and notice the new door already opening behind you.",
 upZ:"一个循环正在圆满：目标落地，旅程归航。接受这份成就的致意——同时留意，新的门已在身后打开。",
 revE:"Reversed, you are one step short of done. Don't slacken at the finish line — push the ninety-nine percent to one hundred today.",
 revZ:"逆位的世界说明你离完成只差一步。别在终点线前松劲——今天就把那件99%的事推到100%。",
 advE:"Done is better than perfect.",advZ:"完成，胜过完美。"}
];

/* ============================================================
   Ambient sky: stars + drifting gold dust
   ============================================================ */
(() => {
  const cv = document.getElementById('sky'), cx = cv.getContext('2d');
  let W, H, stars = [], dust = [], meteors = [];
  function size(){
    W = cv.width = innerWidth * devicePixelRatio; H = cv.height = innerHeight * devicePixelRatio;
    cv.style.width = innerWidth+'px'; cv.style.height = innerHeight+'px';
    stars = Array.from({length:130}, () => ({ x:Math.random()*W, y:Math.random()*H, r:(Math.random()*1.3+.4)*devicePixelRatio,
      p:Math.random()*Math.PI*2, s:.4+Math.random()*1.4 }));
    dust = Array.from({length:34}, () => ({ x:Math.random()*W, y:Math.random()*H, r:(Math.random()*1.8+.7)*devicePixelRatio,
      vy:(.08+Math.random()*.22)*devicePixelRatio, vx:(Math.random()-.5)*.12*devicePixelRatio, p:Math.random()*Math.PI*2 }));
  }
  size(); addEventListener('resize', size);
  (function loop(t){
    requestAnimationFrame(loop);
    if (document.hidden) return;
    cx.clearRect(0,0,W,H);
    for (const s of stars){
      cx.globalAlpha = .25 + .75 * Math.abs(Math.sin(t*.0004*s.s + s.p));
      cx.fillStyle = '#e8ddff';
      cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 7); cx.fill();
    }
    for (const d of dust){
      d.y -= d.vy; d.x += d.vx + Math.sin(t*.001 + d.p)*.15*devicePixelRatio;
      if (d.y < -8){ d.y = H+8; d.x = Math.random()*W; }
      cx.globalAlpha = .18 + .2*Math.abs(Math.sin(t*.0011+d.p));
      cx.fillStyle = '#e8c76f';
      cx.beginPath(); cx.arc(d.x, d.y, d.r, 0, 7); cx.fill();
    }
    // occasional shooting star
    if (Math.random() < .0035 && meteors.length < 2)
      meteors.push({ x: W*(.15+Math.random()*.7), y: H*Math.random()*.35,
        vx:(3.5+Math.random()*4.5)*devicePixelRatio*(Math.random()<.5?-1:1),
        vy:(2+Math.random()*2.5)*devicePixelRatio, life:1 });
    for (let i=meteors.length-1;i>=0;i--){
      const m = meteors[i];
      m.x += m.vx; m.y += m.vy; m.life -= .014;
      if (m.life <= 0 || m.y > H){ meteors.splice(i,1); continue; }
      const g = cx.createLinearGradient(m.x, m.y, m.x - m.vx*9, m.y - m.vy*9);
      g.addColorStop(0, `rgba(255,244,214,${(.75*m.life).toFixed(3)})`);
      g.addColorStop(1, 'rgba(255,244,214,0)');
      cx.globalAlpha = 1; cx.strokeStyle = g; cx.lineWidth = 1.5*devicePixelRatio;
      cx.beginPath(); cx.moveTo(m.x, m.y); cx.lineTo(m.x - m.vx*9, m.y - m.vy*9); cx.stroke();
    }
    cx.globalAlpha = 1;
  })(0);
})();

/* ============================================================
   Sound engine (synthesized — no audio files)
   ============================================================ */
const Snd = (() => {
  let ctx = null, muted = localStorage.getItem('tarot-muted') === '1';
  const AC = window.AudioContext || window.webkitAudioContext;
  function ac(){ if (!AC) return null; if (!ctx) ctx = new AC(); if (ctx.state==='suspended') ctx.resume(); return ctx; }
  function noiseTick(when, freq, gain, dur=.06){
    const c = ac(); if (!c || muted) return;
    const t = c.currentTime + when;
    const len = Math.max(1, (dur*c.sampleRate)|0), buf = c.createBuffer(1, len, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = freq; bp.Q.value = 1.1;
    const g = c.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(.0001, t+dur);
    src.connect(bp).connect(g).connect(c.destination); src.start(t);
  }
  function tone(when, freq, gain, dur){
    const c = ac(); if (!c || muted) return;
    const t = c.currentTime + when;
    const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(.0001, t); g.gain.exponentialRampToValueAtTime(gain, t+.02);
    g.gain.exponentialRampToValueAtTime(.0001, t+dur);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t+dur+.05);
  }
  return {
    get muted(){ return muted; },
    toggle(){ muted = !muted; localStorage.setItem('tarot-muted', muted?'1':'0'); return muted; },
    warm(){ ac(); },
    riffle(){ for (let k=0;k<12;k++) noiseTick(k*.05 + Math.random()*.018, 1500+Math.random()*2200, .07, .05); },
    flick(){ noiseTick(0, 2400+Math.random()*800, .06, .045); },
    slide(){ noiseTick(0, 900+Math.random()*300, .05, .12); },
    chime(){ tone(0, 784, .10, 1.6); tone(.09, 1175, .085, 1.9); tone(.2, 1568, .05, 2.2); },
    bell(){ tone(0, 523, .06, .9); tone(.05, 1046, .04, 1.1); }
  };
})();

/* ============================================================
   Oracle — embedded on-device AI (Chrome Prompt API / Gemini
   Nano) with a hand-crafted composition engine as fallback
   ============================================================ */
const Oracle = {
  lm(){ return globalThis.LanguageModel || (globalThis.ai && globalThis.ai.languageModel) || null; },

  async session(sys){
    const LM = this.lm(); if (!LM) return null;
    try{
      let avail = 'available';
      if (typeof LM.availability === 'function') avail = await LM.availability();
      else if (typeof LM.capabilities === 'function') avail = (await LM.capabilities()).available;
      if (avail === 'unavailable' || avail === 'no') return null;
      if (avail !== 'available' && avail !== 'readily'){
        // model is downloadable — warm it in the background for next time
        try{ LM.create({}).catch(()=>{}); }catch(e){}
        return null;
      }
      try{ return await LM.create({ initialPrompts:[{ role:'system', content:sys }] }); }
      catch(e){ return await LM.create({ systemPrompt: sys }); }
    }catch(e){ return null; }
  },

  buildPrompt(picks, question, lang){
    const posE = ['the past','the present','the future'];
    const posZ = ['过去','现在','未来'];
    const list = picks.map((p,k) => {
      const c = CARDS[p.i];
      const ori = lang==='en' ? (p.rev?'reversed':'upright') : (p.rev?'逆位':'正位');
      const pos = picks.length>1 ? (lang==='en' ? ` (position: ${posE[k]})` : `（位置：${posZ[k]}）`) : '';
      return lang==='en' ? `${k+1}) ${c.en}, ${ori}${pos}` : `${k+1}）${c.zh}（${c.en}），${ori}${pos}`;
    }).join(lang==='en' ? '; ' : '；');
    const d = new Date();
    if (lang === 'en'){
      return `Today is ${d.toDateString()}. ` +
        (question ? `The querent asks: "${question}". ` : `The querent asks for general guidance for the day. `) +
        (picks.length>1 ? `Spread: past / present / future. ` : `Spread: a single card of the day. `) +
        `Cards drawn: ${list}. Weave the cards into one cohesive, personal reading for today.`;
    }
    return `今天是${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日。` +
      (question ? `求问者的问题是：「${question}」。` : `求问者想获得今日的整体指引。`) +
      (picks.length>1 ? `牌阵：过去/现在/未来。` : `牌阵：单张今日牌。`) +
      `抽到的牌：${list}。请把这些牌编织成一段连贯而贴近求问者的今日解读。`;
  },

  sys(lang){
    return lang==='en'
      ? "You are a warm, perceptive tarot reader. Interpret the querent's cards for today using traditional Rider-Waite meanings, adjusted for reversals and positions. Be specific, encouraging but honest, and end with one concrete piece of advice. Write 90-130 words of flowing prose. No lists, no headings, no disclaimers."
      : "你是一位温暖而敏锐的塔罗解读师。请依照传统韦特塔罗的含义，结合正逆位与牌阵位置，为求问者解读今日的牌。语言具体、真诚、鼓励而不虚浮，结尾给出一条切实可行的建议。以100-150字的流畅中文散文作答，不要列表、标题或免责声明。"
  },

  /* ---- fallback composition engine ---- */
  domain(q){
    if (!q) return 'general';
    const s = q.toLowerCase();
    const rules = {
      love:   [/love|relationship|partner|crush|marriage|boyfriend|girlfriend|date|romance|\bex\b/, /感情|恋爱|爱情|喜欢|暗恋|男友|女友|婚|分手|复合|对象|脱单/],
      career: [/work|job|career|boss|interview|project|promotion|business|startup|client|team/, /工作|事业|职|老板|面试|项目|升职|创业|生意|同事|跳槽/],
      money:  [/money|invest|debt|salary|financ|rent|afford|saving/, /钱|财|投资|工资|债|房|存款|理财/],
      health: [/health|sick|sleep|body|energy|diet|anxiety|stress|tired/, /健康|身体|睡眠|生病|锻炼|减肥|焦虑|压力|累/],
      study:  [/study|exam|school|learn|test|degree|thesis|course/, /学习|考试|学校|考研|论文|留学|课程/],
      choice: [/should i|choose|decide|whether|which one|or not/, /该不该|选择|要不要|决定|还是|纠结/]
    };
    for (const k in rules) if (rules[k][0].test(s) || rules[k][1].test(q)) return k;
    return 'general';
  },

  greet(lang){
    const h = new Date().getHours();
    const idx = h < 11 ? 0 : h < 17 ? 1 : h < 22 ? 2 : 3;
    return lang==='en'
      ? ['Morning light falls kindly on the cards.','The afternoon holds its breath around your question.','Evening gathers, and the cards lean closer.','In the deep of night, the deck speaks plainly.'][idx]
      : ['晨光温柔地落在牌面上。','午后的空气围着你的问题屏住了呼吸。','暮色四合，牌向你俯身靠近。','夜深了，牌的声音格外清晰。'][idx];
  },

  domainLine(dom, c, rev, lang){
    const kw = (lang==='en' ? (rev?c.kwR:c.kwU) : (rev?c.kwRz:c.kwUz))[0];
    if (lang==='en'){
      const up = {
        love:`In matters of the heart this is a green light: let ${kw} lead, and honesty offered today returns doubled.`,
        career:`At work, read it as ${kw} — lean into it and make the visible move you've been sitting on.`,
        money:`Where money is concerned it counsels ${kw}: act deliberately and keep the long game in view.`,
        health:`For your body and spirit it points to ${kw} — gentle consistency will do more than any grand gesture.`,
        study:`In your studies it signals ${kw}: the effort you invest today compounds quietly.`,
        choice:`For the decision you're weighing, it tilts the scale toward ${kw} — trust the option that felt right first.`,
        general:`Let ${kw} set the tempo of your day; the current is already moving your way.`
      };
      const rv = {
        love:`In matters of the heart, watch for ${kw} — name it gently before it grows teeth.`,
        career:`At work it cautions against ${kw}: slow down, double-check the ground, then proceed.`,
        money:`Around money it warns of ${kw} — postpone the impulsive move and recount the numbers.`,
        health:`For your wellbeing it flags ${kw}: rest is a strategy today, not a retreat.`,
        study:`In your studies it hints at ${kw} — shrink the task until it starts moving again.`,
        choice:`For your decision it exposes ${kw}: the delay itself is telling you which way you already lean.`,
        general:`Its inverted light asks you to slow where you'd usually rush — the lesson of ${kw} only lands if you let it.`
      };
      return (rev?rv:up)[dom];
    }
    const up = {
      love:`在感情上，这是一盏绿灯：让「${kw}」引路，今天付出的坦诚会加倍回到你身上。`,
      career:`在工作上，它读作「${kw}」——顺着这股劲，把你搁置已久的那步走出去。`,
      money:`在财务上，它建议「${kw}」：从容行事，眼光放远。`,
      health:`在身心上，它指向「${kw}」——温和的坚持胜过任何轰轰烈烈。`,
      study:`在学业上，它预示「${kw}」：今天投入的功夫会安静地复利。`,
      choice:`对你正在权衡的选择，它把天平拨向「${kw}」——相信最初觉得对的那个选项。`,
      general:`让「${kw}」定下今天的节奏；水流已经开始向着你的方向。`
    };
    const rv = {
      love:`在感情上，请留意「${kw}」——趁它还温和时轻轻说破。`,
      career:`在工作上，它提醒你警惕「${kw}」：放慢一点，看清脚下，再继续。`,
      money:`在财务上，它警示「${kw}」——冲动的动作先缓一缓，把数字再算一遍。`,
      health:`在身心上，它点出「${kw}」：今天，休息是一种策略，不是退却。`,
      study:`在学业上，它暗示「${kw}」——把任务切小，直到它重新动起来。`,
      choice:`对你的抉择，它照出了「${kw}」：迟迟不决本身，已经说明你心里偏向哪边。`,
      general:`它以倒转之光请你在惯常疾行处放慢——「${kw}」的功课，慢下来才接得住。`
    };
    return (rev?rv:up)[dom];
  },

  compose(picks, question, lang){
    const dom = this.domain(question);
    const g = this.greet(lang);
    if (picks.length === 1){
      const p = picks[0], c = CARDSS(p.i);
      if (lang==='en'){
        const ori = p.rev ? 'reversed' : 'upright';
        return `${g} From twenty-two doors, ${c.en} stepped through ${ori} — a card of ${c.thE}. ` +
          `${this.domainLine(dom, c, p.rev, 'en')} ` +
          `Carry this as today's counsel: ${lc(c.advE)}`;
      }
      return `${g}在二十二扇门中，走出的是${p.rev?'逆位':'正位'}的「${c.zh}」——一张关于${c.thZ}的牌。` +
        `${this.domainLine(dom, c, p.rev, 'zh')}` +
        `今日签语：${c.advZ}`;
    }
    const [a,b,f] = picks.map(p => CARDSS(p.i));
    const kw = (p,c) => (lang==='en' ? (p.rev?c.kwR:c.kwU) : (p.rev?c.kwRz:c.kwUz))[0];
    if (lang==='en'){
      const o = p => p.rev ? 'reversed' : 'upright';
      return `${g} Your reading arcs from ${a.thE}, through ${b.thE}, toward ${f.thE}. ` +
        `Behind you lies ${a.en} ${o(picks[0])}: ${kw(picks[0],a)} shaped the road that brought you here. ` +
        `At the centre stands ${b.en} ${o(picks[1])} — the present asks you to meet ${kw(picks[1],b)} with open eyes. ` +
        `Ahead waits ${f.en} ${o(picks[2])}: hold this course and the story bends toward ${kw(picks[2],f)}. ` +
        `${this.domainLine(dom, b, picks[1].rev, 'en')} ` +
        `Carry this as today's counsel: ${lc(b.advE)}`;
    }
    const oz = p => p.rev ? '逆位' : '正位';
    return `${g}你的牌面从${a.thZ}，经由${b.thZ}，走向${f.thZ}。` +
      `身后是${oz(picks[0])}的「${a.zh}」：「${kw(picks[0],a)}」塑造了你走到今天的路。` +
      `正中立着${oz(picks[1])}的「${b.zh}」——当下请你睁着眼睛面对「${kw(picks[1],b)}」。` +
      `前方等着${oz(picks[2])}的「${f.zh}」：守住这个方向，故事会转向「${kw(picks[2],f)}」。` +
      `${this.domainLine(dom, b, picks[1].rev, 'zh')}` +
      `今日签语：${b.advZ}`;
  },

  /* generate a reading; onChunk receives progressive text */
  async generate(picks, question, lang, onChunk){
    const attempt = (async () => {
      const s = await this.session(this.sys(lang));
      if (!s) return null;
      try{
        const p = this.buildPrompt(picks, question, lang);
        let out = '';
        if (s.promptStreaming){
          for await (const c of s.promptStreaming(p)){
            out = c.startsWith(out) ? c : out + c;   // cumulative or delta chunks
            onChunk && onChunk(out);
          }
        } else {
          out = await s.prompt(p);
        }
        s.destroy && s.destroy();
        out = (out || '').trim();
        return out.length > 20 ? { text: out, ai: true } : null;
      }catch(e){ try{ s.destroy && s.destroy(); }catch(_){} return null; }
    })();
    const timeout = new Promise(res => setTimeout(() => res(null), 20000));
    const res = await Promise.race([attempt, timeout]);
    if (res) return res;
    return { text: this.compose(picks, question, lang), ai: false };
  }
};
function CARDSS(i){ return CARDS[i]; }
function lc(s){ return s.charAt(0).toLowerCase() + s.slice(1); }

function faceSVG(i, rev){

       <text x="150" y="467" text-anchor="middle" class="fzh">${c.zh}</text>`
    : `<text x="150" y="443" text-anchor="middle" class="zh">${c.zh}</text>
       <text x="150" y="470" text-anchor="middle" class="en">${c.en.toUpperCase()}</text>`;
  return `<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="500" fill="url(#faceBg)"/>
  <g${rev?' transform="rotate(180 150 250)"':''}>
    <rect x="10" y="10" width="280" height="480" rx="12" fill="none" stroke="#caa85c" stroke-width="2.5"/>
    <rect x="18" y="18" width="264" height="464" rx="7" fill="none" stroke="#caa85c" stroke-width="1" opacity=".5"/>
    <use href="#cornerFleur" transform="translate(22,22) scale(.8)"/>
    <use href="#cornerFleur" transform="translate(278,22) scale(-.8,.8)"/>
    <use href="#cornerFleur" transform="translate(22,478) scale(.8,-.8)"/>
    <use href="#cornerFleur" transform="translate(278,478) scale(-.8,-.8)"/>
    <text x="150" y="58" text-anchor="middle" class="rn">${c.rn}</text>
    <path d="M104 72 H196 M96 72 l-6 0 M204 72 l6 0" stroke="#caa85c" stroke-width="1" opacity=".6"/>
    <circle cx="150" cy="240" r="118" fill="url(#halo)"/>
    <circle cx="150" cy="240" r="112" fill="none" stroke="#caa85c" stroke-width="1" opacity=".45"/>
    <circle cx="150" cy="240" r="106" fill="none" stroke="#caa85c" stroke-width="2" stroke-dasharray="1 8" stroke-linecap="round" opacity=".5"/>
    <g transform="translate(50,140)" stroke="#e8c76f" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">${ART[i]}</g>
    <path d="M104 398 H196 M96 398 l-6 0 M204 398 l6 0" stroke="#caa85c" stroke-width="1" opacity=".6"/>
    ${nameBlock}
  </g></svg>`;
}
const backSVG = `<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg"><use href="#cardBack"/></svg>`;

function buildDeck(){
  stage.innerHTML = ''; stage.className = '';
  state.els = []; state.picks = []; state.flipped = 0; state.shuffles = 0;
  state.order = CARDS.map((_,i)=>i);
  for (let i=state.order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [state.order[i],state.order[j]]=[state.order[j],state.order[i]]; }
  state.jitter = CARDS.map(()=>({ x:(Math.random()-.5)*3, y:(Math.random()-.5)*3, r:(Math.random()-.5)*3 }));
  for (let i=0;i<CARDS.length;i++){
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.i = i;
    el.innerHTML = `<div class="inner">
        <div class="face back">${backSVG}</div>
        <div class="face front"></div>
      </div><div class="pile-tag"></div><div class="slot-tag"></div>`;
    el.addEventListener('click', () => onCardClick(i));
    stage.appendChild(el); state.els[i] = el;
  }
  layoutDeck(true);
}

function stageSize(){ const r = stage.getBoundingClientRect(); return { w:r.width, h:r.height }; }
const T = (x,y,r=0,s=1) => `translate(${x}px, ${y}px) rotate(${r}deg) scale(${s})`;

function layoutDeck(instant){
  const { h } = stageSize();
  const dy = -h*.02;
  state.order.forEach((ci, pos) => {
    const el = state.els[ci], j = state.jitter[ci];
    if (instant) el.style.transition = 'none';
    el.style.zIndex = 100 + (state.order.length - pos);
    el.style.transform = T(j.x, dy + j.y - (state.order.length-pos)*.45, j.r);
    if (instant){ void el.offsetWidth; el.style.transition = ''; }
  });
}

/* ---- shuffle ---- */
let shuffling = false;
function doShuffle(){
  if (shuffling) return;
  shuffling = true; state.shuffles++;
  Snd.riffle(); buzz(18);
  const { w, h } = stageSize();
  const dy = -h*.02;
  for (let i=state.order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [state.order[i],state.order[j]]=[state.order[j],state.order[i]]; }
  const spreadX = Math.min(w*.34, 240), spreadY = Math.min(h*.16, 130);
  let done = 0;
  state.order.forEach((ci, pos) => {
    const el = state.els[ci], j = state.jitter[ci];
    const side = pos % 2 ? 1 : -1;
    const midX = side * (spreadX*.45 + Math.random()*spreadX*.55);
    const midY = dy + (Math.random()-.5)*2*spreadY;
    const rot  = side * (24 + Math.random()*46);
    const base = T(j.x, dy + j.y - (state.order.length-pos)*.45, j.r);
    el.style.zIndex = 100 + (state.order.length - pos);
    const anim = el.animate([
      { transform: el.style.transform || base },
      { transform: T(midX, midY, rot), offset:.42 },
      { transform: T(midX*.5, midY*.6 - 14, rot*.4), offset:.62 },
      { transform: base }
    ], { duration: 620 + Math.random()*260, delay: pos*13, easing:'cubic-bezier(.35,.15,.25,1)' });
    anim.onfinish = () => {
      el.style.transform = base;
      if (++done === state.order.length){
        shuffling = false;
        if (state.shuffles === 1) setHint(L().hMore, L().hMoreS);
      }
    };
  });
}

/* ---- cut ---- */
function doCut(){
  if (shuffling) return;
  state.phase = 'cut';
  stage.className = 'cut';
  Snd.slide(); buzz(12);
  $('#deck-glow').classList.add('off');
  setHint(L().hCut, L().hCutS);
  setActions([]);
  const { w, h } = stageSize();
  const dy = -h*.02;
  const px = Math.min(w*.30, 230);
  const xs = [-px, 0, px];
  const third = Math.ceil(state.order.length/3);
  state.order.forEach((ci, pos) => {
    const el = state.els[ci];
    const pile = Math.min(2, (pos/third)|0);
    const inPile = pos - pile*third;
    el.dataset.pile = pile;
    el.classList.toggle('pile-top', inPile === 0);
    if (inPile === 0) el.querySelector('.pile-tag').textContent = L().piles[pile];
    const j = state.jitter[ci];
    el.style.transform = T(xs[pile] + j.x, dy + j.y - (third-inPile)*.5, j.r);
    el.style.zIndex = 100 + (third - inPile);
  });
}
function onPilePicked(pile){
  Snd.flick(); buzz(14);
  const chosen = [], rest = [];
  for (const ci of state.order) (+state.els[ci].dataset.pile === pile ? chosen : rest).push(ci);
  state.order = chosen.concat(rest);
  state.els.forEach(el => { el.classList.remove('pile-top'); el.querySelector('.pile-tag').textContent=''; delete el.dataset.pile; });
  stage.className = '';
  layoutDeck(false);
  setHint(L().hSet, '');
  setTimeout(fanOut, 820);
}

/* ---- fan ---- */
function fanOut(){
  state.phase = 'fan';
  stage.className = 'fan';
  Snd.riffle(); buzz(10);
  $('#deck-glow').classList.add('off');
  document.getElementById('ritual').classList.add('gone-ritual');
  const need = state.spreadN;
  setHint(need===1 ? L().hPick1 : L().hPick3, need===1 ? L().hPick1S : L().hPick3S);
  setActions([]);
  layoutFan();
  updatePickCount();
}
function layoutFan(){
  const { w, h } = stageSize();
  const n = state.order.length;
  const cw = state.els[0].offsetWidth;
  const R = Math.min(520, Math.max(h*.45, w*.55));
  const halfSin = Math.min(.95, Math.max(.25, (w*.5 - cw*.55) / R));
  const half = Math.min(55, Math.asin(halfSin) * 180/Math.PI);
  const apexY = h*.64;
  const pivotDrop = apexY - h*.5 + R;
  state.order.forEach((ci, pos) => {
    const el = state.els[ci];
    if (el.classList.contains('gone') || el.classList.contains('placed')) return;
    const a = -half + 2*half*(pos/(n-1));
    el.style.zIndex = 100 + pos;
    el.style.transitionDelay = (pos*22)+'ms';
    el.style.transform = `translateY(${pivotDrop}px) rotate(${a}deg) translateY(${-R}px)`;
  });
  setTimeout(()=> state.els.forEach(el=> el.style.transitionDelay=''), n*22 + 800);
}
function updatePickCount(){
  const need = state.spreadN, got = state.picks.length;
  pickCountEl.textContent = need>1 ? `✦ ${got} / ${need} ✦` : '';
  pickCountEl.classList.toggle('show', need>1 && got<need);
}

function onCardClick(ci){
  const el = state.els[ci];
  if (state.phase === 'cut'){
    if (el.dataset.pile !== undefined) onPilePicked(+el.dataset.pile);
    return;
  }
  if (state.phase === 'fan'){
    if (el.classList.contains('selected') || el.classList.contains('gone')) return;
    if (state.picks.length >= state.spreadN) return;
    const rev = Math.random() < .38;
    state.picks.push({ i: ci, rev });
    el.classList.add('selected');
    Snd.flick(); buzz(16);
    updatePickCount();
    if (state.picks.length === state.spreadN) setTimeout(gatherPicks, 420);
    return;
  }
  if (state.phase === 'reveal'){
    if (!el.classList.contains('placed') || el.classList.contains('flipped')) return;
    flipCard(state.picks.findIndex(p => p.i === ci));
  }
}

/* ---- fly picks to centre slots ---- */
function slotTransforms(){
  const { w, h } = stageSize();
  const n = state.spreadN;
  const cw = state.els[0].offsetWidth, ch = state.els[0].offsetHeight;
  const scale = n===1
    ? Math.min(1.9, (h*.5)/ch, (w*.6)/cw)
    : Math.min(1.25, (h*.42)/ch, (w*.29)/cw);
  const gap = Math.min(w*.32, cw*scale + w*.05);
  return state.picks.map((_, k) => ({
    x: n===1 ? 0 : (k-1)*gap,
    y: -h*.075,
    scale
  }));
}
function placePicks(lifted){
  const slots = slotTransforms(), h = stageSize().h;
  state.picks.forEach((p, k) => {
    const el = state.els[p.i], s = slots[k];
    const sc = lifted ? s.scale*.92 : s.scale;
    el.style.transform = T(s.x, s.y - (lifted ? h*.12 : 0), 0, sc);
    el.querySelector('.slot-tag').style.transform = `translateX(-50%) scale(${(1/sc).toFixed(3)})`;
  });
}
function gatherPicks(){
  state.phase = 'reveal';
  stage.className = 'reveal';
  setHint(L().hFlip,'');
  pickCountEl.classList.remove('show');
  Snd.slide(); buzz(10);
  const pickedSet = new Set(state.picks.map(p=>p.i));
  let d = 0;
  state.order.forEach((ci) => {
    if (!pickedSet.has(ci)){
      const el = state.els[ci];
      el.style.transitionDelay = (d++*10)+'ms';
      el.classList.add('gone');
      el.style.transform += ' translateY(60px)';
    }
  });
  state.picks.forEach((p, k) => {
    const el = state.els[p.i];
    el.querySelector('.face.front').innerHTML = faceSVG(p.i, p.rev);
    el.querySelector('.slot-tag').textContent = state.spreadN>1 ? L().pos[k] : L().slot1;
    el.classList.remove('selected');
    el.classList.add('revealing');
    el.style.transitionDelay = (k*140)+'ms';
    el.style.zIndex = 300 + k;
    setTimeout(()=>{ el.classList.add('placed'); el.style.transitionDelay=''; }, 900 + k*140);
  });
  placePicks(false);
}

/* ---- flip & sparkle ---- */
function flipCard(k){
  if (k < 0) return;
  const p = state.picks[k], el = state.els[p.i];
  el.dataset.flipT = Date.now();
  el.classList.add('flipped','glowing');
  Snd.chime(); buzz([12,40,12]);
  setTimeout(()=> sparkleBurst(el), 380);
  setTimeout(()=> el.classList.remove('glowing'), 1800);
  state.flipped++;
  if (state.flipped === state.picks.length){
    setTimeout(finishReading, 950);
  }
}
function sparkleBurst(el){
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i=0;i<22;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    document.body.appendChild(s);
    const a = Math.random()*Math.PI*2, dist = 60 + Math.random()*130;
    const sc = .5 + Math.random()*1.3;
    s.style.left = cx+'px'; s.style.top = cy+'px';
    s.animate([
      { transform:`translate(-50%,-50%) scale(${sc})`, opacity:1 },
      { transform:`translate(calc(-50% + ${Math.cos(a)*dist}px), calc(-50% + ${Math.sin(a)*dist - 30}px)) scale(0)`, opacity:0 }
    ], { duration: 700 + Math.random()*500, easing:'cubic-bezier(.2,.6,.3,1)' }).onfinish = () => s.remove();
  }
}

/* ---- reading sheet ---- */
function readingHTML(){
  const en = state.lang === 'en';
  const cards = state.picks.map((p, k) => {
    const c = CARDS[p.i];
    const kws = KW(c, p.rev).map(w=>`<span class="r-kw">${w}</span>`).join('');
    const nameMain = en
      ? `<span class="r-name lat">${c.en}</span><span class="r-en">${c.rn} · ${c.zh}</span>`
      : `<span class="r-name">${c.zh}</span><span class="r-en">${c.rn} · ${c.en.toUpperCase()}</span>`;
    return `<div class="reading">
      ${state.spreadN>1?`<div class="r-pos">${L().pos[k]}</div>`:''}
      <div class="r-head">
        ${nameMain}
        <span class="r-ori ${p.rev?'rev':'up'}">${p.rev?L().rev:L().up}</span>
      </div>
      <div class="r-kws">${kws}</div>
      <p class="r-text">${MEAN(c, p.rev)}</p>
    </div>`;
  }).join('');
  const q = state.question
    ? `<div class="o-q">${L().yourQ}: <b>“${escapeHtml(state.question)}”</b></div>` : '';
  return cards + `
    <div class="oracle">
      <div class="o-head"><span class="o-title">✦ ${L().oracle} ✦</span><span class="o-badge" id="o-badge"></span></div>
      ${q}
      <div class="o-text" id="o-text"><span class="o-shimmer">${L().oWait}</span></div>
    </div>`;
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function showSheet(){
  sheetBody.innerHTML = readingHTML() + `
    <div class="sheet-btns">
      <button class="btn ghost" id="btn-copy">${L().copy}</button>
      <button class="btn ghost" id="btn-again">${L().again}</button>
    </div>`;
  $('#btn-copy').onclick = copyReading;
  $('#btn-again').onclick = resetAll;
  sheet.classList.add('show');
}

async function runOracle(saved){
  const run = ++state.oracleRun;
  const textEl = $('#o-text'), badge = $('#o-badge');
  if (!textEl) return;
  if (saved && saved.text){
    textEl.textContent = saved.text;
    badge.textContent = saved.ai ? L().oAI : L().oClassic;
    state.oracleText = saved;
    return;
  }
  const res = await Oracle.generate(state.picks, state.question, state.lang, partial => {
    if (state.oracleRun === run && textEl.isConnected) textEl.textContent = partial;
  });
  if (state.oracleRun !== run) return;
  badge.textContent = res.ai ? L().oAI : L().oClassic;
  state.oracleText = res;
  if (res.ai || !textEl.isConnected){
    textEl.textContent = res.text;
  } else {
    // gentle word-by-word reveal for the composed reading
    const words = res.text.split(state.lang==='en' ? ' ' : '');
    const sep = state.lang==='en' ? ' ' : '';
    textEl.textContent = '';
    let i = 0;
    const tick = () => {
      if (state.oracleRun !== run || !textEl.isConnected){ return; }
      textEl.textContent += (i && sep ? sep : '') + words[i];
      if (++i < words.length) setTimeout(tick, state.lang==='en' ? 34 : 18);
    };
    tick();
  }
  saveToday();
}

function saveToday(){
  try{
    localStorage.setItem(todayKey(), JSON.stringify({
      n: state.spreadN, picks: state.picks, q: state.question,
      oracle: state.oracleText || null, lang: state.lang
    }));
  }catch(e){}
}

function finishReading(){
  setHint('','');
  Snd.bell();
  state.oracleText = null;
  saveToday();
  showSheet();
  runOracle(null);
  placePicks(true);
}

function copyReading(){
  const d = new Date();
  const lines = [`✦ Daily Tarot · ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ✦`];
  if (state.question) lines.push(`${L().yourQ}: ${state.question}`);
  state.picks.forEach((p,k)=>{
    const c = CARDS[p.i];
    const pos = state.spreadN>1 ? `${L().posN[k]}: ` : '';
    lines.push(`${pos}${N(c)} (${p.rev?L().rev:L().up}) — ${KW(c,p.rev).join(' / ')}`);
    lines.push(MEAN(c, p.rev));
  });
  if (state.oracleText && state.oracleText.text){
    lines.push(`— ${L().oracle} —`);
    lines.push(state.oracleText.text);
  }
  const txt = lines.join('\n');
  (navigator.clipboard ? navigator.clipboard.writeText(txt) : Promise.reject())
    .then(()=>toast(L().copied))
    .catch(()=>toast(L().copyFail));
}

/* ---- phase entries ---- */
function enterTable(){
  state.question = ($('#q-input').value || '').trim();
  $('#welcome').classList.add('hidden');
  $('#table').classList.remove('hidden');
  $('#lang-toggle').style.display = 'none';
  sheet.classList.remove('show');
  document.getElementById('ritual').classList.remove('gone-ritual');
  $('#deck-glow').classList.remove('off');
  state.phase = 'deck';
  buildDeck();
  setHint(L().hShuffle, L().hShuffleS);
  setActions([
    { label:L().bShuffle, primary:true, on:doShuffle },
    { label:L().bCut, on:()=>{ if(state.shuffles===0){ toast(L().tFirst); return;} doCut(); } },
    { label:L().bSkip, ghost:true, on:()=>{ if(!shuffling) fanOut(); } },
  ]);
}
function resetAll(){
  state.oracleRun++;
  sheet.classList.remove('show');
  $('#table').classList.add('hidden');
  $('#welcome').classList.remove('hidden');
  $('#lang-toggle').style.display = '';
  state.phase = 'welcome';
  refreshTodayChip();
  replayWelcomeAnim();
}
function replayWelcomeAnim(){
  const w = $('#welcome');
  w.classList.remove('anim'); void w.offsetWidth; w.classList.add('anim');
}
function refreshTodayChip(){
  $('#today-chip').style.display = localStorage.getItem(todayKey()) ? '' : 'none';
}
function showSaved(){
  const saved = localStorage.getItem(todayKey());
  if (!saved) return;
  let data; try{ data = JSON.parse(saved); }catch(e){ return; }
  state.spreadN = data.n;
  state.question = data.q || '';
  if (data.lang && I18N[data.lang]){ state.lang = data.lang; localStorage.setItem('tarot-lang', state.lang); applyLang(); }
  $('#welcome').classList.add('hidden');
  $('#table').classList.remove('hidden');
  $('#lang-toggle').style.display = 'none';
  buildDeck();
  state.picks = data.picks;
  state.phase = 'reveal'; state.flipped = data.picks.length;
  stage.className = 'reveal';
  document.getElementById('ritual').classList.add('gone-ritual');
  $('#deck-glow').classList.add('off');
  setHint('',''); setActions([]);
  const pickedSet = new Set(data.picks.map(p=>p.i));
  state.els.forEach((el,ci)=>{ if(!pickedSet.has(ci)){ el.style.transition='none'; el.classList.add('gone'); } });
  data.picks.forEach((p,k)=>{
    const el = state.els[p.i];
    el.querySelector('.face.front').innerHTML = faceSVG(p.i, p.rev);
    el.querySelector('.slot-tag').textContent = data.n>1 ? L().pos[k] : L().slot1;
    el.style.transition = 'none';
    el.style.zIndex = 300+k;
    el.classList.add('placed','flipped');
  });
  placePicks(true);
  data.picks.forEach(p=>{ const el = state.els[p.i]; void el.offsetWidth; el.style.transition = ''; });
  showSheet();
  runOracle(data.oracle);
}

/* ---- language ---- */
function applyLang(){
  const t = L();
  const en = state.lang === 'en';
  const main = $('#t-main');
  main.textContent = t.main;
  main.classList.toggle('lat', en);
  main.classList.toggle('han', !en);
  $('#t-sub').textContent = t.sub;
  $('#t-sub').style.fontFamily = en ? "'Noto Serif SC',serif" : "Cinzel,serif";
  $('#t-tag').textContent = t.tag;
  $('#sp1-name').textContent = t.sp1; $('#sp1-desc').textContent = t.sp1d;
  $('#sp3-name').textContent = t.sp3; $('#sp3-desc').textContent = t.sp3d;
  $('#q-input').placeholder = t.q;
  $('#btn-start').textContent = t.start;
  $('#today-chip').textContent = t.chip;
  $('#lang-toggle').textContent = en ? '中文' : 'EN';
  document.documentElement.lang = en ? 'en' : 'zh-CN';
}

/* ---- wire up ---- */
document.querySelectorAll('.spread-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.spread-opt').forEach(o=>o.classList.remove('on'));
    opt.classList.add('on');
    state.spreadN = +opt.dataset.n;
    Snd.flick();
  });
});
$('#btn-start').addEventListener('click', () => { Snd.warm(); Snd.slide(); enterTable(); });
$('#today-chip').addEventListener('click', showSaved);
$('#lang-toggle').addEventListener('click', () => {
  state.lang = state.lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('tarot-lang', state.lang);
  applyLang(); Snd.flick();
});
const st = $('#sound-toggle');
function paintSound(){ st.textContent = Snd.muted ? '∅' : '♪'; st.style.opacity = Snd.muted ? .5 : 1; }
st.addEventListener('click', () => { Snd.toggle(); paintSound(); });
paintSound();
addEventListener('pointerdown', () => Snd.warm(), { once:true });
addEventListener('resize', () => {
  if (state.phase === 'fan') layoutFan();
  else if (state.phase === 'deck') layoutDeck(true);
  else if (state.phase === 'reveal' && state.picks.length){
    placePicks(state.flipped === state.picks.length);
  }
});
/* interactive 3D tilt on revealed cards (fine pointers only) */
if (matchMedia('(pointer:fine)').matches){
  const tiltReset = () =>
    document.querySelectorAll('.card.placed.flipped .inner').forEach(n => { n.style.transform=''; n.style.transition=''; });
  stage.addEventListener('pointermove', e => {
    const card = e.target.closest ? e.target.closest('.card.placed.flipped') : null;
    document.querySelectorAll('.card.placed.flipped').forEach(el => {
      if (el !== card){ const n = el.querySelector('.inner'); n.style.transform=''; n.style.transition=''; }
    });
    if (!card || Date.now() - (+card.dataset.flipT || 0) < 1000) return;
    const r = card.getBoundingClientRect();
    const dx = (e.clientX - r.left)/r.width - .5, dy = (e.clientY - r.top)/r.height - .5;
    const n = card.querySelector('.inner');
    n.style.transition = 'transform .18s ease-out';
    n.style.transform = `rotateY(180deg) rotateX(${(-dy*9).toFixed(2)}deg) rotateY(${(dx*9).toFixed(2)}deg)`;
  });
  stage.addEventListener('pointerleave', tiltReset);
}

applyLang();
refreshTodayChip();
replayWelcomeAnim();
</script>
</body>
</html>
