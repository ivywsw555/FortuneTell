<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0a1f">
<title>每日塔罗 | Daily Tarot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@400;600;700&display=swap">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --gold:#e8c76f; --gold-dim:#caa85c; --gold-deep:#9c7c3c;
  --ink:#f4ead0; --ink-dim:#b9aa88;
  --bg0:#0d0a1f; --bg1:#171233; --bg2:#241a4d;
  --cw: clamp(66px, 17vmin, 118px);
  --ch: calc(var(--cw) * 5 / 3);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; overflow:hidden; }
body{
  font-family:'Noto Serif SC', serif;
  color:var(--ink);
  background:
    radial-gradient(120vmax 90vmax at 50% -20%, #2c2160 0%, transparent 55%),
    radial-gradient(90vmax 70vmax at 85% 110%, #241a4d 0%, transparent 60%),
    linear-gradient(180deg, #100c26 0%, var(--bg0) 60%, #080614 100%);
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
}
#sky{ position:fixed; inset:0; z-index:0; pointer-events:none; }
#app{ position:fixed; inset:0; z-index:1; overflow:hidden; }

/* ---------- shared UI ---------- */
.btn{
  font-family:'Noto Serif SC',serif; font-size:15px; letter-spacing:.35em; text-indent:.35em;
  color:var(--ink); background:linear-gradient(180deg, rgba(232,199,111,.14), rgba(232,199,111,.04));
  border:1px solid rgba(232,199,111,.55); border-radius:999px;
  padding:12px 28px; cursor:pointer; backdrop-filter:blur(6px);
  transition:all .25s ease; box-shadow:0 0 0 rgba(232,199,111,0);
}
.btn:hover{ border-color:var(--gold); box-shadow:0 0 22px rgba(232,199,111,.28); transform:translateY(-1px); }
.btn:active{ transform:translateY(1px) scale(.98); }
.btn.primary{ background:linear-gradient(180deg, rgba(232,199,111,.32), rgba(200,160,70,.12)); font-weight:600; }
.btn.ghost{ border-color:rgba(232,199,111,.25); color:var(--ink-dim); letter-spacing:.2em; font-size:13px; padding:9px 20px; }
.btn:disabled{ opacity:.35; pointer-events:none; }

#sound-toggle{
  position:fixed; top:calc(env(safe-area-inset-top, 0px) + 14px); right:16px; z-index:60;
  width:42px; height:42px; border-radius:50%; border:1px solid rgba(232,199,111,.4);
  background:rgba(20,15,45,.5); color:var(--gold); font-size:17px; cursor:pointer;
  backdrop-filter:blur(6px); transition:all .25s;
}
#sound-toggle:hover{ box-shadow:0 0 16px rgba(232,199,111,.3); }

.screen{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .6s ease, transform .6s ease; }
.screen.hidden{ opacity:0; pointer-events:none; transform:scale(.97); }

/* ---------- welcome ---------- */
#welcome{ text-align:center; padding:24px; gap:0; }
.w-emblem{ width:min(150px,22vmin); margin-bottom:10px; filter:drop-shadow(0 0 24px rgba(232,199,111,.35));
  animation:breathe 5s ease-in-out infinite; }
@keyframes breathe{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-8px) } }
.w-title-en{ font-family:Cinzel,serif; font-size:clamp(13px,2.4vmin,17px); letter-spacing:.7em; text-indent:.7em;
  color:var(--gold-dim); margin-bottom:8px; }
.w-title{ font-size:clamp(34px,8vmin,56px); font-weight:700; letter-spacing:.28em; text-indent:.28em;
  background:linear-gradient(180deg,#fdf3d3 20%, var(--gold) 55%, #a5813e 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 2px 14px rgba(232,199,111,.25)); }
.w-divider{ display:flex; align-items:center; gap:12px; margin:18px 0 10px; color:var(--gold-dim); opacity:.9; }
.w-divider::before,.w-divider::after{ content:""; width:min(90px,18vw); height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim)); }
.w-divider::after{ transform:scaleX(-1); }
.w-sub{ color:var(--ink-dim); font-size:14px; letter-spacing:.25em; margin-bottom:34px; }
.spreads{ display:flex; gap:16px; margin-bottom:34px; flex-wrap:wrap; justify-content:center; }
.spread-opt{
  width:min(178px,42vw); padding:18px 12px 16px; border-radius:14px; cursor:pointer;
  border:1px solid rgba(232,199,111,.28); background:linear-gradient(180deg, rgba(36,26,77,.55), rgba(16,12,38,.55));
  transition:all .3s ease; position:relative;
}
.spread-opt:hover{ transform:translateY(-4px); }
.spread-opt.on{ border-color:var(--gold); box-shadow:0 0 26px rgba(232,199,111,.22), inset 0 0 18px rgba(232,199,111,.06); }
.spread-opt .so-cards{ display:flex; justify-content:center; gap:5px; margin-bottom:12px; height:44px; align-items:center; }
.spread-opt .so-cards i{ display:block; width:26px; height:40px; border-radius:4px;
  border:1px solid rgba(232,199,111,.6); background:linear-gradient(160deg,#2b2058,#171233);
  box-shadow:0 3px 8px rgba(0,0,0,.5); }
.spread-opt .so-cards i:nth-child(2){ height:44px; width:28px; }
.spread-opt.on .so-cards i{ border-color:var(--gold); box-shadow:0 0 10px rgba(232,199,111,.35); }
.spread-opt .so-name{ font-size:16px; letter-spacing:.2em; margin-bottom:4px; }
.spread-opt .so-desc{ font-size:12px; color:var(--ink-dim); letter-spacing:.1em; }
#today-chip{ margin-top:18px; font-size:13px; color:var(--ink-dim); letter-spacing:.15em;
  border:none; background:none; cursor:pointer; text-decoration:underline dotted rgba(232,199,111,.5);
  text-underline-offset:5px; font-family:inherit; }
#today-chip:hover{ color:var(--gold); }

/* ---------- table ---------- */
#table{ justify-content:flex-start; }
#hint{
  margin-top:calc(env(safe-area-inset-top, 0px) + 26px); text-align:center; min-height:52px; z-index:40;
  font-size:clamp(15px,2.6vmin,18px); letter-spacing:.3em; text-indent:.3em; color:var(--ink);
  text-shadow:0 0 18px rgba(232,199,111,.25); transition:opacity .4s; padding:0 20px;
}
#hint small{ display:block; font-size:12px; letter-spacing:.2em; color:var(--ink-dim); margin-top:7px; }
#stage{ position:absolute; inset:0; }

/* ritual circle under the deck */
#ritual{ position:absolute; left:50%; top:50%; width:min(74vmin,560px); height:min(74vmin,560px);
  transform:translate(-50%,-50%); opacity:.5; pointer-events:none; transition:opacity .8s;
  animation:spin 140s linear infinite; }
@keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }
#ritual.gone-ritual{ opacity:.12; }
#deck-glow{ position:absolute; left:50%; top:50%; width:min(50vmin,380px); height:min(30vmin,230px);
  transform:translate(-50%,-46%); border-radius:50%; pointer-events:none;
  background:radial-gradient(closest-side, rgba(232,199,111,.20), rgba(232,199,111,.05) 55%, transparent 72%);
  animation:glowpulse 3.4s ease-in-out infinite; transition:opacity .6s; }
#deck-glow.off{ animation:none; opacity:0; }
@keyframes glowpulse{ 0%,100%{ opacity:.65; transform:translate(-50%,-46%) scale(1);} 50%{ opacity:1; transform:translate(-50%,-46%) scale(1.07);} }

/* ---------- cards ---------- */
.card{
  position:absolute; left:50%; top:50%;
  width:var(--cw); height:var(--ch);
  margin-left:calc(var(--cw) / -2); margin-top:calc(var(--ch) / -2);
  transform-style:preserve-3d; cursor:pointer;
  transition:transform .75s cubic-bezier(.34,1.2,.4,1), opacity .5s ease;
  will-change:transform;
}
.card .inner{
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform .3s ease;
}
.card.flipped .inner{ transform:rotateY(180deg); transition:transform .85s cubic-bezier(.35,.1,.25,1); }
.face{
  position:absolute; inset:0; border-radius:9.5% / 5.7%;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden; background:var(--bg1);
  box-shadow:0 7px 20px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.4);
}
.face svg{ display:block; width:100%; height:100%; }
.face.front{ transform:rotateY(180deg); }
.face.back::after{ /* moving sheen on the card back */
  content:""; position:absolute; inset:0;
  background:linear-gradient(115deg, transparent 30%, rgba(255,240,200,.10) 45%, rgba(255,240,200,.16) 50%, rgba(255,240,200,.10) 55%, transparent 70%);
  background-size:260% 260%; animation:sheen 5.5s ease-in-out infinite;
}
@keyframes sheen{ 0%{ background-position:120% 0 } 55%,100%{ background-position:-120% 0 } }

#stage.fan .card:not(.selected):not(.gone):hover .inner{ transform:translateY(calc(var(--ch) * -0.16)) scale(1.05); }
#stage.fan .card:not(.selected):not(.gone):hover .face{ box-shadow:0 16px 34px rgba(0,0,0,.6), 0 0 22px rgba(232,199,111,.3); }
.card.selected .inner{ transform:translateY(calc(var(--ch) * -0.24)); }
.card.selected .face{ box-shadow:0 18px 40px rgba(0,0,0,.65), 0 0 0 2px var(--gold), 0 0 30px rgba(232,199,111,.55); }
.card.gone{ opacity:0; pointer-events:none; }
.card.revealing{ transition:transform .9s cubic-bezier(.3,1.1,.35,1); }
.card.glowing .face{ box-shadow:0 20px 50px rgba(0,0,0,.6), 0 0 44px rgba(232,199,111,.5); }
.slot-tag{
  position:absolute; left:50%; bottom:-34px; transform:translateX(-50%);
  transform-origin:50% 0;
  font-size:12.5px; letter-spacing:.3em; text-indent:.3em; color:var(--gold-dim); white-space:nowrap;
  opacity:0; transition:opacity .6s .3s;
}
.card.placed .slot-tag{ opacity:1; }

/* pile hint labels for cutting */
.pile-tag{ position:absolute; left:50%; top:-42px; transform:translateX(-50%);
  font-family:Cinzel,serif; color:var(--gold-dim); font-size:15px; letter-spacing:.2em;
  opacity:0; transition:opacity .4s .35s; pointer-events:none; white-space:nowrap; }
#stage.cut .card.pile-top .pile-tag{ opacity:.95; }
#stage.cut .card.pile-top:hover .face{ box-shadow:0 12px 30px rgba(0,0,0,.6), 0 0 26px rgba(232,199,111,.4); }

/* action bar */
#actions{ position:absolute; bottom:calc(env(safe-area-inset-bottom, 0px) + 26px); left:0; right:0;
  display:flex; justify-content:center; gap:14px; z-index:45; flex-wrap:wrap; padding:0 16px;
  transition:opacity .4s, transform .4s; }
#actions.hidden{ opacity:0; pointer-events:none; transform:translateY(14px); }
#pick-count{ position:absolute; bottom:calc(env(safe-area-inset-bottom, 0px) + 88px); left:0; right:0; text-align:center;
  font-family:Cinzel,serif; color:var(--gold-dim); letter-spacing:.35em; font-size:13px; opacity:0; transition:opacity .4s; }
#pick-count.show{ opacity:1; }

/* sparks on reveal */
.spark{ position:absolute; width:7px; height:7px; pointer-events:none; z-index:80;
  background:radial-gradient(circle, #fff6d8 0%, var(--gold) 45%, transparent 70%);
  border-radius:50%; }

/* ---------- reading sheet ---------- */
#sheet{
  position:fixed; left:50%; bottom:0; transform:translate(-50%,105%); z-index:50;
  width:min(680px, calc(100% - 20px));
  max-height:52%; overflow-y:auto; overscroll-behavior:contain;
  background:linear-gradient(180deg, rgba(30,22,64,.92), rgba(14,10,32,.96));
  border:1px solid rgba(232,199,111,.35); border-bottom:none; border-radius:22px 22px 0 0;
  backdrop-filter:blur(14px); padding:16px 22px calc(env(safe-area-inset-bottom, 0px) + 18px);
  box-shadow:0 -18px 60px rgba(0,0,0,.55);
  transition:transform .7s cubic-bezier(.3,1,.3,1);
}
#sheet.show{ transform:translate(-50%,0); }
#sheet::-webkit-scrollbar{ width:4px } #sheet::-webkit-scrollbar-thumb{ background:rgba(232,199,111,.3); border-radius:2px }
.sheet-handle{ width:44px; height:4px; border-radius:2px; background:rgba(232,199,111,.4); margin:0 auto 14px; }
.reading{ padding:6px 0 14px; }
.reading + .reading{ border-top:1px dashed rgba(232,199,111,.22); padding-top:16px; }
.r-pos{ font-size:12px; letter-spacing:.4em; text-indent:.4em; color:var(--gold-dim); text-align:center; margin-bottom:6px; }
.r-head{ display:flex; align-items:baseline; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
.r-name{ font-size:22px; font-weight:700; letter-spacing:.14em; color:var(--ink); }
.r-en{ font-family:Cinzel,serif; font-size:12px; letter-spacing:.22em; color:var(--ink-dim); }
.r-ori{ font-size:11.5px; padding:2.5px 10px; border-radius:999px; letter-spacing:.2em; text-indent:.2em; }
.r-ori.up{ color:#ffe9ad; border:1px solid rgba(232,199,111,.55); background:rgba(232,199,111,.12); }
.r-ori.rev{ color:#c9b6ff; border:1px solid rgba(156,124,255,.5); background:rgba(124,92,220,.14); }
.r-kws{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin:10px 0 12px; }
.r-kw{ font-size:12px; color:var(--gold-dim); border:1px solid rgba(232,199,111,.3); border-radius:999px;
  padding:3px 12px; letter-spacing:.15em; background:rgba(232,199,111,.05); }
.r-text{ font-size:14.5px; line-height:1.95; color:var(--ink); text-align:justify; letter-spacing:.04em; }
.r-adv{ margin-top:12px; font-size:13.5px; line-height:1.8; color:var(--gold-dim); text-align:center;
  padding:10px 14px; border-radius:12px; background:rgba(232,199,111,.06); letter-spacing:.06em; }
.r-adv b{ color:var(--gold); font-weight:600; letter-spacing:.25em; }
.sheet-btns{ display:flex; justify-content:center; gap:12px; margin-top:6px; padding-top:14px;
  border-top:1px solid rgba(232,199,111,.18); flex-wrap:wrap; }
#toast{ position:fixed; left:50%; top:18%; transform:translate(-50%,-8px); z-index:99;
  background:rgba(20,15,45,.9); border:1px solid rgba(232,199,111,.5); color:var(--ink);
  font-size:13.5px; letter-spacing:.2em; padding:10px 22px; border-radius:999px;
  opacity:0; pointer-events:none; transition:all .4s; backdrop-filter:blur(8px); }
#toast.show{ opacity:1; transform:translate(-50%,0); }

/* svg typography */
text.rn{ font-family:Cinzel,serif; font-size:30px; fill:var(--gold); letter-spacing:3px; }
text.zh{ font-family:'Noto Serif SC',serif; font-size:34px; font-weight:600; fill:var(--ink); letter-spacing:8px; }
text.en{ font-family:Cinzel,serif; font-size:14.5px; fill:var(--gold-dim); letter-spacing:3px; }

@media (max-height:620px){
  .w-sub{ margin-bottom:20px } .spreads{ margin-bottom:20px }
  #sheet{ max-height:62% }
}
</style>
</head>
<body>

<canvas id="sky"></canvas>

<!-- shared SVG defs: gradients, card back, ornaments -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <radialGradient id="backBg" cx="50%" cy="42%" r="75%">
    <stop offset="0%" stop-color="#2e2260"/><stop offset="55%" stop-color="#1d1542"/><stop offset="100%" stop-color="#110c28"/>
  </radialGradient>
  <linearGradient id="faceBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1d1742"/><stop offset="60%" stop-color="#141030"/><stop offset="100%" stop-color="#0d0a1f"/>
  </linearGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8c76f" stop-opacity=".22"/><stop offset="70%" stop-color="#e8c76f" stop-opacity=".05"/>
    <stop offset="100%" stop-color="#e8c76f" stop-opacity="0"/>
  </radialGradient>
  <pattern id="lat" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <path d="M0 0H26M0 13H26" stroke="#8f76c9" stroke-width=".8"/>
  </pattern>
  <path id="spark4" d="M0,-8 L1.9,-1.9 L8,0 L1.9,1.9 L0,8 L-1.9,1.9 L-8,0 L-1.9,-1.9 Z" fill="#e8c76f"/>
  <g id="cornerFleur" fill="none" stroke="#caa85c" stroke-width="2" stroke-linecap="round">
    <path d="M6 34 Q6 6 34 6"/>
    <path d="M12 34 Q12 12 34 12" opacity=".55"/>
    <path d="M15 24 Q24 24 24 15" opacity=".8"/>
    <circle cx="29" cy="29" r="2.4" fill="#caa85c" stroke="none"/>
  </g>

  <!-- ====== THE CARD BACK ====== -->
  <g id="cardBack">
    <rect width="300" height="500" fill="url(#backBg)"/>
    <rect x="20" y="20" width="260" height="460" fill="url(#lat)" opacity=".22"/>
    <rect x="11" y="11" width="278" height="478" rx="12" fill="none" stroke="#caa85c" stroke-width="2.5"/>
    <rect x="20" y="20" width="260" height="460" rx="7" fill="none" stroke="#caa85c" stroke-width="1" opacity=".55"/>
    <use href="#cornerFleur" transform="translate(24,24)"/>
    <use href="#cornerFleur" transform="translate(276,24) scale(-1,1)"/>
    <use href="#cornerFleur" transform="translate(24,476) scale(1,-1)"/>
    <use href="#cornerFleur" transform="translate(276,476) scale(-1,-1)"/>
    <!-- moon-phase rows -->
    <g fill="none" stroke="#caa85c" stroke-width="1.4">
      <circle cx="110" cy="52" r="6" fill="#caa85c"/>
      <path d="M136 46 a6 6 0 0 0 0 12 a8.5 8.5 0 0 1 0 -12 Z" fill="#caa85c" stroke="none"/>
      <circle cx="150" cy="52" r="7"/>
      <path d="M164 46 a6 6 0 0 1 0 12 a8.5 8.5 0 0 0 0 -12 Z" fill="#caa85c" stroke="none"/>
      <circle cx="190" cy="52" r="6" fill="#caa85c"/>
    </g>
    <g fill="none" stroke="#caa85c" stroke-width="1.4" transform="translate(0,896) scale(1,-1)">
      <circle cx="110" cy="52" r="6" fill="#caa85c"/>
      <path d="M136 46 a6 6 0 0 0 0 12 a8.5 8.5 0 0 1 0 -12 Z" fill="#caa85c" stroke="none"/>
      <circle cx="150" cy="52" r="7"/>
      <path d="M164 46 a6 6 0 0 1 0 12 a8.5 8.5 0 0 0 0 -12 Z" fill="#caa85c" stroke="none"/>
      <circle cx="190" cy="52" r="6" fill="#caa85c"/>
    </g>
    <!-- central mandala -->
    <g transform="translate(150,250)" fill="none" stroke="#e8c76f">
      <circle r="103" stroke-width="1.1" opacity=".8"/>
      <circle r="96" stroke-width="3" stroke-dasharray="1 7" stroke-linecap="round" opacity=".9"/>
      <rect x="-60" y="-60" width="120" height="120" stroke-width="1.5" opacity=".85"/>
      <rect x="-60" y="-60" width="120" height="120" stroke-width="1.5" opacity=".85" transform="rotate(45)"/>
      <circle r="48" fill="#160f38" stroke-width="1.6"/>
      <circle r="42" stroke-width=".8" opacity=".5"/>
      <!-- crescent cradling a star -->
      <path d="M8,-30 A31 31 0 1 0 8,30 A24.5 24.5 0 1 1 8,-30 Z" fill="#e8c76f" stroke="none" opacity=".95"/>
      <use href="#spark4" transform="translate(13,0) scale(1.5)"/>
      <!-- dots around inner circle -->
      <g fill="#e8c76f" stroke="none" opacity=".9">
        <circle cx="0" cy="-72" r="2.6"/><circle cx="0" cy="72" r="2.6"/>
        <circle cx="-72" cy="0" r="2.6"/><circle cx="72" cy="0" r="2.6"/>
        <circle cx="51" cy="-51" r="2"/><circle cx="-51" cy="-51" r="2"/>
        <circle cx="51" cy="51" r="2"/><circle cx="-51" cy="51" r="2"/>
      </g>
    </g>
    <!-- scattered sparkles -->
    <use href="#spark4" transform="translate(56,120) scale(.8)" opacity=".85"/>
    <use href="#spark4" transform="translate(244,132) scale(.6)" opacity=".7"/>
    <use href="#spark4" transform="translate(60,382) scale(.6)" opacity=".7"/>
    <use href="#spark4" transform="translate(240,372) scale(.8)" opacity=".85"/>
    <use href="#spark4" transform="translate(150,140) scale(.5)" opacity=".55"/>
    <use href="#spark4" transform="translate(150,362) scale(.5)" opacity=".55"/>
  </g>

  <!-- ritual circle (table decoration) -->
  <g id="ritualCircle" fill="none" stroke="#e8c76f">
    <circle cx="300" cy="300" r="292" stroke-width="1" opacity=".5"/>
    <circle cx="300" cy="300" r="272" stroke-width="2.5" stroke-dasharray="1 10" stroke-linecap="round" opacity=".6"/>
    <circle cx="300" cy="300" r="216" stroke-width="1" opacity=".35"/>
    <g font-size="26" fill="#caa85c" stroke="none" opacity=".8" font-family="serif" text-anchor="middle">
      <text x="300" y="52">☉</text><text x="300" y="566">☽</text>
      <text x="44" y="310">♁</text><text x="556" y="310">☿</text>
      <text x="120" y="130">♃</text><text x="484" y="130">♀</text>
      <text x="120" y="492">♄</text><text x="484" y="492">♂</text>
    </g>
  </g>
</defs>
</svg>

<button id="sound-toggle" title="音效">♪</button>

<div id="app">

  <!-- WELCOME -->
  <section id="welcome" class="screen">
    <svg class="w-emblem" viewBox="0 0 120 120" fill="none">
      <circle cx="60" cy="60" r="44" stroke="#caa85c" stroke-width="1" opacity=".6"/>
      <circle cx="60" cy="60" r="52" stroke="#caa85c" stroke-width="2" stroke-dasharray="1 8" stroke-linecap="round" opacity=".7"/>
      <path d="M72,26 A38 38 0 1 0 72,94 A30 30 0 1 1 72,26 Z" fill="#e8c76f"/>
      <use href="#spark4" transform="translate(78,60) scale(1.6)"/>
      <use href="#spark4" transform="translate(95,32) scale(.8)"/>
      <use href="#spark4" transform="translate(28,90) scale(.7)"/>
    </svg>
    <div class="w-title-en">DAILY&nbsp;TAROT</div>
    <h1 class="w-title">每日塔罗</h1>

/* ============================================================
   Ambient sky: stars + drifting gold dust
   ============================================================ */
(() => {
  const cv = document.getElementById('sky'), cx = cv.getContext('2d');
  let W, H, stars = [], dust = [];
  function size(){
    W = cv.width = innerWidth * devicePixelRatio; H = cv.height = innerHeight * devicePixelRatio;
    cv.style.width = innerWidth+'px'; cv.style.height = innerHeight+'px';
    stars = Array.from({length:130}, () => ({ x:Math.random()*W, y:Math.random()*H, r:(Math.random()*1.3+.4)*devicePixelRatio,
      p:Math.random()*Math.PI*2, s:.4+Math.random()*1.4 }));
    dust = Array.from({length:34}, () => ({ x:Math.random()*W, y:Math.random()*H, r:(Math.random()*1.8+.7)*devicePixelRatio,
      vy:(.08+Math.random()*.22)*devicePixelRatio, vx:(Math.random()-.5)*.12*devicePixelRatio, p:Math.random()*Math.PI*2 }));
  }
  size(); addEventListener('resize', size);
  (function loop(t){
    requestAnimationFrame(loop);
    if (document.hidden) return;
    cx.clearRect(0,0,W,H);
    for (const s of stars){
      const a = .25 + .75 * Math.abs(Math.sin(t*.0004*s.s + s.p));
      cx.globalAlpha = a; cx.fillStyle = '#e8ddff';
      cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 7); cx.fill();
    }
    for (const d of dust){
      d.y -= d.vy; d.x += d.vx + Math.sin(t*.001 + d.p)*.15*devicePixelRatio;
      if (d.y < -8){ d.y = H+8; d.x = Math.random()*W; }
      cx.globalAlpha = .18 + .2*Math.abs(Math.sin(t*.0011+d.p));
      cx.fillStyle = '#e8c76f';
      cx.beginPath(); cx.arc(d.x, d.y, d.r, 0, 7); cx.fill();
    }
    cx.globalAlpha = 1;
  })(0);
})();

/* ============================================================
   Sound engine (tiny, synthesized — no audio files)
   ============================================================ */
const Snd = (() => {
  let ctx = null, muted = localStorage.getItem('tarot-muted') === '1';
  const AC = window.AudioContext || window.webkitAudioContext;
  function ac(){ if (!AC) return null; if (!ctx) ctx = new AC(); if (ctx.state==='suspended') ctx.resume(); return ctx; }
  function noiseTick(when, freq, gain, dur=.06){
    const c = ac(); if (!c || muted) return;
    const t = c.currentTime + when;
    const len = Math.max(1, (dur*c.sampleRate)|0), buf = c.createBuffer(1, len, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = freq; bp.Q.value = 1.1;
    const g = c.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(.0001, t+dur);
    src.connect(bp).connect(g).connect(c.destination); src.start(t);
  }
  function tone(when, freq, gain, dur, type='sine'){
    const c = ac(); if (!c || muted) return;
    const t = c.currentTime + when;
    const o = c.createOscillator(); o.type = type; o.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(.0001, t); g.gain.exponentialRampToValueAtTime(gain, t+.02);
    g.gain.exponentialRampToValueAtTime(.0001, t+dur);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t+dur+.05);
  }
  return {
    get muted(){ return muted; },
    toggle(){ muted = !muted; localStorage.setItem('tarot-muted', muted?'1':'0'); return muted; },
    warm(){ ac(); },
    riffle(){ for (let k=0;k<12;k++) noiseTick(k*.05 + Math.random()*.018, 1500+Math.random()*2200, .07, .05); },
    flick(){ noiseTick(0, 2400+Math.random()*800, .06, .045); },
    slide(){ noiseTick(0, 900+Math.random()*300, .05, .12); },
    chime(){ tone(0, 784, .10, 1.6); tone(.09, 1175, .085, 1.9); tone(.2, 1568, .05, 2.2); },
    bell(){ tone(0, 523, .06, .9); tone(.05, 1046, .04, 1.1); }
  };
})();
const buzz = ms => { try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} };

/* ============================================================
   Tarot table
   ============================================================ */
const $ = s => document.querySelector(s);
const stage = $('#stage'), hintEl = $('#hint'), actionsEl = $('#actions'),
      sheet = $('#sheet'), sheetBody = $('#sheet-body'), pickCountEl = $('#pick-count');

const state = {
  phase: 'welcome',        // welcome | deck | cut | fan | reveal
  spreadN: 1,
  order: [],               // card indices, deck order (0 = top)
  els: [],                 // card elements by card index
  picks: [],               // [{i, rev}]
  flipped: 0,
  shuffles: 0,
  jitter: [],              // per-card resting jitter in the stack
};
const POS3 = ['过去 · PAST','现在 · PRESENT','未来 · FUTURE'];
const todayKey = () => { const d = new Date(); return `tarot-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };

function setHint(main, sub=''){ hintEl.innerHTML = main ? `${main}${sub?`<small>${sub}</small>`:''}` : ''; }
function setActions(list){
  actionsEl.innerHTML = '';
  for (const b of list){
    const el = document.createElement('button');
    el.className = 'btn' + (b.primary?' primary':'') + (b.ghost?' ghost':'');
    el.textContent = b.label; el.onclick = b.on;
    actionsEl.appendChild(el);
  }
  actionsEl.classList.toggle('hidden', !list.length);
}
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

function faceSVG(i, rev){
  const c = CARDS[i];
  return `<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="500" fill="url(#faceBg)"/>
  <g${rev?' transform="rotate(180 150 250)"':''}>
    <rect x="10" y="10" width="280" height="480" rx="12" fill="none" stroke="#caa85c" stroke-width="2.5"/>
    <rect x="18" y="18" width="264" height="464" rx="7" fill="none" stroke="#caa85c" stroke-width="1" opacity=".5"/>
    <use href="#cornerFleur" transform="translate(22,22) scale(.8)"/>
    <use href="#cornerFleur" transform="translate(278,22) scale(-.8,.8)"/>
    <use href="#cornerFleur" transform="translate(22,478) scale(.8,-.8)"/>
    <use href="#cornerFleur" transform="translate(278,478) scale(-.8,-.8)"/>
    <text x="150" y="58" text-anchor="middle" class="rn">${c.rn}</text>
    <path d="M104 72 H196 M96 72 l-6 0 M204 72 l6 0" stroke="#caa85c" stroke-width="1" opacity=".6"/>
    <circle cx="150" cy="240" r="118" fill="url(#halo)"/>
    <circle cx="150" cy="240" r="112" fill="none" stroke="#caa85c" stroke-width="1" opacity=".45"/>
    <circle cx="150" cy="240" r="106" fill="none" stroke="#caa85c" stroke-width="2" stroke-dasharray="1 8" stroke-linecap="round" opacity=".5"/>
    <g transform="translate(50,140)" stroke="#e8c76f" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">${ART[i]}</g>
    <path d="M104 398 H196 M96 398 l-6 0 M204 398 l6 0" stroke="#caa85c" stroke-width="1" opacity=".6"/>
    <text x="150" y="443" text-anchor="middle" class="zh">${c.zh}</text>
    <text x="150" y="470" text-anchor="middle" class="en">${c.en.toUpperCase()}</text>
  </g></svg>`;
}
const backSVG = `<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg"><use href="#cardBack"/></svg>`;

function buildDeck(){
  stage.innerHTML = ''; stage.className = '';
  state.els = []; state.picks = []; state.flipped = 0; state.shuffles = 0;
  state.order = CARDS.map((_,i)=>i);
  // pre-shuffle silently so the fan is never in book order
  for (let i=state.order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [state.order[i],state.order[j]]=[state.order[j],state.order[i]]; }
  state.jitter = CARDS.map(()=>({ x:(Math.random()-.5)*3, y:(Math.random()-.5)*3, r:(Math.random()-.5)*3 }));
  for (let i=0;i<CARDS.length;i++){
    const el = document.createElement('div');
    el.className = 'card'; el.dataset.i = i;
    el.innerHTML = `<div class="inner">
        <div class="face back">${backSVG}</div>
        <div class="face front"></div>
      </div><div class="pile-tag"></div><div class="slot-tag"></div>`;
    el.addEventListener('click', () => onCardClick(i));
    stage.appendChild(el); state.els[i] = el;
  }
  layoutDeck(true);
}

function stageSize(){ const r = stage.getBoundingClientRect(); return { w:r.width, h:r.height }; }
const T = (x,y,r=0,s=1) => `translate(${x}px, ${y}px) rotate(${r}deg) scale(${s})`;

function layoutDeck(instant){
  const { h } = stageSize();
  const dy = -h*.02;
  state.order.forEach((ci, pos) => {
    const el = state.els[ci], j = state.jitter[ci];
    if (instant) el.style.transition = 'none';
    el.style.zIndex = 100 + (state.order.length - pos);
    el.style.transform = T(j.x, dy + j.y - (state.order.length-pos)*.45, j.r);
    if (instant){ void el.offsetWidth; el.style.transition = ''; }
  });
}

/* ---- shuffle: cards burst out both sides, swirl, and re-stack ---- */
let shuffling = false;
function doShuffle(){
  if (shuffling) return;
  shuffling = true; state.shuffles++;
  Snd.riffle(); buzz(18);
  const { w, h } = stageSize();
  const dy = -h*.02;
  // real reorder
  for (let i=state.order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [state.order[i],state.order[j]]=[state.order[j],state.order[i]]; }
  const spreadX = Math.min(w*.34, 240), spreadY = Math.min(h*.16, 130);
  let done = 0;
  state.order.forEach((ci, pos) => {
    const el = state.els[ci], j = state.jitter[ci];
    const side = pos % 2 ? 1 : -1;
    const midX = side * (spreadX*.45 + Math.random()*spreadX*.55);
    const midY = dy + (Math.random()-.5)*2*spreadY;
    const rot  = side * (24 + Math.random()*46);
    const base = T(j.x, dy + j.y - (state.order.length-pos)*.45, j.r);
    el.style.zIndex = 100 + (state.order.length - pos);
    const anim = el.animate([
      { transform: el.style.transform || base },
      { transform: T(midX, midY, rot), offset:.42 },
      { transform: T(midX*.5, midY*.6 - 14, rot*.4), offset:.62 },
      { transform: base }
    ], { duration: 620 + Math.random()*260, delay: pos*13, easing:'cubic-bezier(.35,.15,.25,1)' });
    anim.onfinish = () => {
      el.style.transform = base;
      if (++done === state.order.length){
        shuffling = false;
        if (state.shuffles === 1) setHint('可以多洗几次，直到心里踏实', '然后凭直觉切牌');
      }
    };
  });
}

/* ---- cut: split into 3 piles, tapping one puts it on top ---- */
function doCut(){
  if (shuffling) return;
  state.phase = 'cut';
  stage.className = 'cut';
  Snd.slide(); buzz(12);
  $('#deck-glow').classList.add('off');
  setHint('凭直觉，轻点其中一叠', '它将成为命运的开端');
  setActions([]);
  const { w, h } = stageSize();
  const dy = -h*.02;
  const px = Math.min(w*.30, 230);
  const xs = [-px, 0, px];
  const names = ['壹','贰','叁'];
  const third = Math.ceil(state.order.length/3);
  state.order.forEach((ci, pos) => {
    const el = state.els[ci];
    const pile = Math.min(2, (pos/third)|0);
    const inPile = pos - pile*third;
    el.dataset.pile = pile;
    el.classList.toggle('pile-top', inPile === 0);
    if (inPile === 0) el.querySelector('.pile-tag').textContent = names[pile];
    const j = state.jitter[ci];
    el.style.transform = T(xs[pile] + j.x, dy + j.y - (third-inPile)*.5, j.r);
    el.style.zIndex = 100 + (third - inPile);
  });
}
function onPilePicked(pile){
  Snd.flick(); buzz(14);
  const chosen = [], rest = [];
  for (const ci of state.order) (+state.els[ci].dataset.pile === pile ? chosen : rest).push(ci);
  state.order = chosen.concat(rest);
  state.els.forEach(el => { el.classList.remove('pile-top'); el.querySelector('.pile-tag').textContent=''; delete el.dataset.pile; });
  stage.className = '';
  layoutDeck(false);
  setHint('命运已然就位', '');
  setTimeout(fanOut, 820);
}

/* ---- fan out for picking ---- */
function fanOut(){
  state.phase = 'fan';
  stage.className = 'fan';
  Snd.riffle(); buzz(10);
  $('#deck-glow').classList.add('off');
  document.getElementById('ritual').classList.add('gone-ritual');
  const need = state.spreadN;
  setHint(need===1 ? '默想心中之问，选出今日之牌' : '静心默想，依次选出三张牌',
          need===1 ? 'follow your intuition' : '第一张为过去 · 第二张为现在 · 第三张为未来');
  setActions([]);
  layoutFan();
  updatePickCount();
}
function layoutFan(){
  const { w, h } = stageSize();
  const n = state.order.length;
  const cw = state.els[0].offsetWidth;
  const R = Math.min(520, Math.max(h*.45, w*.55));
  // widest half-angle that keeps the outermost cards on screen
  const halfSin = Math.min(.95, Math.max(.25, (w*.5 - cw*.55) / R));
  const half = Math.min(55, Math.asin(halfSin) * 180/Math.PI);
  const apexY = h*.64;                       // arc apex (card centre), from stage top
  const pivotDrop = apexY - h*.5 + R;        // pivot, relative to stage centre
  state.order.forEach((ci, pos) => {
    const el = state.els[ci];
    if (el.classList.contains('gone') || el.classList.contains('placed')) return;
    const a = -half + 2*half*(pos/(n-1));
    el.style.zIndex = 100 + pos;
    el.style.transitionDelay = (pos*22)+'ms';
    el.style.transform = `translateY(${pivotDrop}px) rotate(${a}deg) translateY(${-R}px)`;
  });
  setTimeout(()=> state.els.forEach(el=> el.style.transitionDelay=''), n*22 + 800);
}
function updatePickCount(){
  const need = state.spreadN, got = state.picks.length;
  pickCountEl.textContent = need>1 ? `✦ ${got} / ${need} ✦` : '';
  pickCountEl.classList.toggle('show', need>1 && got<need);
}

function onCardClick(ci){
  const el = state.els[ci];
  if (state.phase === 'cut'){
    if (el.dataset.pile !== undefined) onPilePicked(+el.dataset.pile);
    return;
  }
  if (state.phase === 'fan'){
    if (el.classList.contains('selected') || el.classList.contains('gone')) return;
    if (state.picks.length >= state.spreadN) return;
    const rev = Math.random() < .38;
    state.picks.push({ i: ci, rev });
    el.classList.add('selected');
    Snd.flick(); buzz(16);
    updatePickCount();
    if (state.picks.length === state.spreadN) setTimeout(gatherPicks, 420);
    return;
  }
  if (state.phase === 'reveal'){
    if (!el.classList.contains('placed') || el.classList.contains('flipped')) return;
    flipCard(state.picks.findIndex(p => p.i === ci));
  }
}

/* ---- fly the chosen cards to centre slots ---- */
function slotTransforms(){
  const { w, h } = stageSize();
  const n = state.spreadN;
  const cw = state.els[0].offsetWidth, ch = state.els[0].offsetHeight;
  const scale = n===1
    ? Math.min(1.9, (h*.5)/ch, (w*.6)/cw)
    : Math.min(1.25, (h*.42)/ch, (w*.29)/cw);
  const gap = Math.min(w*.32, cw*scale + w*.05);
  return state.picks.map((_, k) => ({
    x: n===1 ? 0 : (k-1)*gap,
    y: -h*.075,
    scale
  }));
}
function placePicks(lifted){
  const slots = slotTransforms(), h = stageSize().h;
  state.picks.forEach((p, k) => {
    const el = state.els[p.i], s = slots[k];
    const sc = lifted ? s.scale*.92 : s.scale;
    el.style.transform = T(s.x, s.y - (lifted ? h*.12 : 0), 0, sc);
    el.querySelector('.slot-tag').style.transform = `translateX(-50%) scale(${(1/sc).toFixed(3)})`;
  });
}
function gatherPicks(){
  state.phase = 'reveal';
  stage.className = 'reveal';
  setHint('轻触卡牌，揭示指引','');
  pickCountEl.classList.remove('show');
  Snd.slide(); buzz(10);
  const pickedSet = new Set(state.picks.map(p=>p.i));
  let d = 0;
  state.order.forEach((ci) => {
    if (!pickedSet.has(ci)){
      const el = state.els[ci];
      el.style.transitionDelay = (d++*10)+'ms';
      el.classList.add('gone');
      el.style.transform += ' translateY(60px)';
    }
  });
  state.picks.forEach((p, k) => {
    const el = state.els[p.i];
    // build the front face now — orientation was decided at pick time
    el.querySelector('.face.front').innerHTML = faceSVG(p.i, p.rev);
    el.querySelector('.slot-tag').textContent = state.spreadN>1 ? POS3[k] : '今日之牌 · YOUR CARD';
    el.classList.remove('selected');
    el.classList.add('revealing');
    el.style.transitionDelay = (k*140)+'ms';
    el.style.zIndex = 300 + k;
    setTimeout(()=>{ el.classList.add('placed'); el.style.transitionDelay=''; }, 900 + k*140);
  });
  placePicks(false);
}

/* ---- flip & sparkle ---- */
function flipCard(k){
  if (k < 0) return;
  const p = state.picks[k], el = state.els[p.i];
  el.classList.add('flipped','glowing');
  Snd.chime(); buzz([12,40,12]);
  setTimeout(()=> sparkleBurst(el), 380);
  setTimeout(()=> el.classList.remove('glowing'), 1800);
  state.flipped++;
  if (state.flipped === state.picks.length){
    setTimeout(finishReading, 950);
  }
}
function sparkleBurst(el){
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i=0;i<22;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    document.body.appendChild(s);
    const a = Math.random()*Math.PI*2, dist = 60 + Math.random()*130;
    const sc = .5 + Math.random()*1.3;
    s.style.left = cx+'px'; s.style.top = cy+'px';
    s.animate([
      { transform:`translate(-50%,-50%) scale(${sc})`, opacity:1 },
      { transform:`translate(calc(-50% + ${Math.cos(a)*dist}px), calc(-50% + ${Math.sin(a)*dist - 30}px)) scale(0)`, opacity:0 }
    ], { duration: 700 + Math.random()*500, easing:'cubic-bezier(.2,.6,.3,1)' }).onfinish = () => s.remove();
  }
}

/* ---- reading sheet ---- */
function readingHTML(){
  const advP = state.picks[state.spreadN===1 ? 0 : 1];   // advice from today's / "present" card
  return state.picks.map((p, k) => {
    const c = CARDS[p.i];
    const kws = (p.rev ? c.rkw : c.kw).map(w=>`<span class="r-kw">${w}</span>`).join('');
    return `<div class="reading">
      ${state.spreadN>1?`<div class="r-pos">${POS3[k]}</div>`:''}
      <div class="r-head">
        <span class="r-name">${c.zh}</span>
        <span class="r-en">${c.rn} · ${c.en.toUpperCase()}</span>
        <span class="r-ori ${p.rev?'rev':'up'}">${p.rev?'逆位':'正位'}</span>
      </div>
      <div class="r-kws">${kws}</div>
      <p class="r-text">${p.rev ? c.rev : c.up}</p>
      ${k===state.picks.length-1?`<div class="r-adv"><b>今日签语</b><br>${CARDS[advP.i].adv}</div>`:''}
    </div>`;
  }).join('');
}
function showSheet(){
  sheetBody.innerHTML = readingHTML() + `
    <div class="sheet-btns">
      <button class="btn ghost" id="btn-copy">复制签文</button>
      <button class="btn ghost" id="btn-again">重新占卜</button>
    </div>`;
  $('#btn-copy').onclick = copyReading;
  $('#btn-again').onclick = resetAll;
  sheet.classList.add('show');
}
function finishReading(){
  setHint('','');
  Snd.bell();
  try{ localStorage.setItem(todayKey(), JSON.stringify({ n: state.spreadN, picks: state.picks })); }catch(e){}
  showSheet();
  // nudge cards up so the sheet doesn't cover them
  placePicks(true);
}
function copyReading(){
  const d = new Date();
  const lines = [`✦ 每日塔罗 ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ✦`];
  state.picks.forEach((p,k)=>{
    const c = CARDS[p.i];
    lines.push(`${state.spreadN>1 ? POS3[k].split(' ')[0]+'：':''}${c.zh}（${p.rev?'逆位':'正位'}）— ${(p.rev?c.rkw:c.kw).join(' / ')}`);
    lines.push(p.rev ? c.rev : c.up);
  });
  const txt = lines.join('\n');
  (navigator.clipboard ? navigator.clipboard.writeText(txt) : Promise.reject())
    .then(()=>toast('签文已复制 ✦'))
    .catch(()=>toast('复制失败，请截图保存'));
}

/* ---- phase entries ---- */
function enterTable(){
  $('#welcome').classList.add('hidden');
  $('#table').classList.remove('hidden');
  sheet.classList.remove('show');
  document.getElementById('ritual').classList.remove('gone-ritual');
  $('#deck-glow').classList.remove('off');
  state.phase = 'deck';
  buildDeck();
  setHint('洗牌，把今日的心绪注入牌中', '心中默念想问之事');
  setActions([
    { label:'洗 牌', primary:true, on:doShuffle },
    { label:'切 牌', on:()=>{ if(state.shuffles===0){ toast('先洗一次牌吧 ✦'); return;} doCut(); } },
    { label:'直接展牌', ghost:true, on:()=>{ if(!shuffling) fanOut(); } },
  ]);
}
function resetAll(){
  sheet.classList.remove('show');
  $('#table').classList.add('hidden');
  $('#welcome').classList.remove('hidden');
  state.phase = 'welcome';
  refreshTodayChip();
}
function refreshTodayChip(){
  $('#today-chip').style.display = localStorage.getItem(todayKey()) ? '' : 'none';
}
function showSaved(){
  const saved = localStorage.getItem(todayKey());
  if (!saved) return;
  let data; try{ data = JSON.parse(saved); }catch(e){ return; }
  state.spreadN = data.n;
  $('#welcome').classList.add('hidden');
  $('#table').classList.remove('hidden');
  buildDeck();
  state.picks = data.picks;
  state.phase = 'reveal'; state.flipped = data.picks.length;
  stage.className = 'reveal';
  document.getElementById('ritual').classList.add('gone-ritual');
  $('#deck-glow').classList.add('off');
  setHint('',''); setActions([]);
  const pickedSet = new Set(data.picks.map(p=>p.i));
  state.els.forEach((el,ci)=>{ if(!pickedSet.has(ci)){ el.style.transition='none'; el.classList.add('gone'); } });
  data.picks.forEach((p,k)=>{
    const el = state.els[p.i];
    el.querySelector('.face.front').innerHTML = faceSVG(p.i, p.rev);
    el.querySelector('.slot-tag').textContent = data.n>1 ? POS3[k] : '今日之牌 · YOUR CARD';
    el.style.transition = 'none';
    el.style.zIndex = 300+k;
    el.classList.add('placed','flipped');
  });
  placePicks(true);
  data.picks.forEach(p=>{ const el = state.els[p.i]; void el.offsetWidth; el.style.transition = ''; });
  showSheet();
}

/* ---- wire up ---- */
document.querySelectorAll('.spread-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.spread-opt').forEach(o=>o.classList.remove('on'));
    opt.classList.add('on');
    state.spreadN = +opt.dataset.n;
    Snd.flick();
  });
});
$('#btn-start').addEventListener('click', () => { Snd.warm(); Snd.slide(); enterTable(); });
$('#today-chip').addEventListener('click', showSaved);
const st = $('#sound-toggle');
function paintSound(){ st.textContent = Snd.muted ? '∅' : '♪'; st.style.opacity = Snd.muted ? .5 : 1; }
st.addEventListener('click', () => { Snd.toggle(); paintSound(); });
paintSound();
addEventListener('pointerdown', () => Snd.warm(), { once:true });
addEventListener('resize', () => {
  if (state.phase === 'fan') layoutFan();
  else if (state.phase === 'deck') layoutDeck(true);
  else if (state.phase === 'reveal' && state.picks.length){
    placePicks(state.flipped === state.picks.length);
  }
});
refreshTodayChip();
</script>
</body>
</html>
